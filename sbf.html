<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1a24">
<title>SBF Trainer · Binnen &amp; See</title>
<style>
  :root{
    --bg:#081722; --bg2:#0d212f; --panel:#102a3c; --panel-soft:#143347;
    --panel-2:#1a3f57;
    --ink:#eaf4fb; --muted:#8eb0c6; --line:#234a63; --line-soft:#1d3e54;
    --accent:#19b6c9; --accent2:#3ad0a8;
    --accent-ink:#06151d;
    --green:#34d97f; --green-bg:rgba(52,217,127,.15);
    --red:#ff647a; --red-bg:rgba(255,100,122,.15);
    --gold:#ffd56b;
    --shadow:0 18px 50px -24px rgba(0,0,0,.85);
    --shadow-sm:0 4px 16px -8px rgba(0,0,0,.6);
    --r-sm:11px; --r-md:14px; --r-lg:18px; --r-xl:22px;
    --sat:env(safe-area-inset-top,0px);
    --sab:env(safe-area-inset-bottom,0px);
    --sal:env(safe-area-inset-left,0px);
    --sar:env(safe-area-inset-right,0px);
    --navh:72px;
    --content-max:780px;
    /* Horizontaler Innenabstand skaliert sanft mit der Viewport-Breite */
    --pad-x:clamp(14px,4vw,22px);
  }
  [data-theme="light"]{
    --bg:#eef4f8; --bg2:#e2ecf2; --panel:#ffffff; --panel-soft:#f3f8fb;
    --panel-2:#e8f1f6;
    --ink:#0f2330; --muted:#54707f; --line:#d6e3ec; --line-soft:#e3edf3;
    --accent:#0e94a6; --accent2:#16a883;
    --accent-ink:#ffffff;
    --green:#15a35a; --green-bg:rgba(21,163,90,.12);
    --red:#dc3a4d; --red-bg:rgba(220,58,77,.12);
    --gold:#bd8a14;
    --shadow:0 18px 50px -30px rgba(20,40,55,.32);
    --shadow-sm:0 3px 12px -6px rgba(20,40,55,.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%;font-size:16px;}
  html,body{margin:0;padding:0;overflow-x:hidden;width:100%;max-width:100%;}
  body::before{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(1200px 600px at 88% -8%, rgba(58,208,168,.10), transparent 55%),
      radial-gradient(1000px 560px at 0% 108%, rgba(25,182,201,.10), transparent 55%),
      var(--bg);
    transition:background .4s;
  }
  body{
    background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    min-height:100vh;min-height:100dvh;transition:background .4s,color .3s;
    -webkit-font-smoothing:antialiased;letter-spacing:.01em;
  }
  .app{max-width:var(--content-max);margin:0 auto;
    padding:calc(14px + var(--sat)) calc(var(--pad-x) + var(--sar)) calc(28px + var(--sab)) calc(var(--pad-x) + var(--sal));}
  body.has-nav .app{padding-bottom:calc(var(--navh) + var(--sab) + 24px);}

  .topbar{display:flex;align-items:center;gap:12px;padding:14px 16px;margin-bottom:20px;
    background:linear-gradient(135deg,var(--panel),var(--panel-soft));border:1px solid var(--line);
    border-radius:var(--r-lg);box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .logo{width:46px;height:46px;border-radius:13px;flex:0 0 auto;
    background:conic-gradient(from 210deg,var(--accent),var(--accent2),var(--accent));
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:var(--accent-ink);letter-spacing:-.5px;}
  .brand{flex:1;min-width:0;}
  .brand h1{font-size:17px;margin:0;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .brand p{font-size:11px;margin:2px 0 0;color:var(--muted);text-transform:uppercase;letter-spacing:.16em;}
  .icon-btn{background:var(--panel-soft);border:1px solid var(--line);color:var(--ink);min-width:44px;height:44px;
    border-radius:12px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;
    transition:transform .15s,border-color .15s;flex:0 0 auto;}
  .icon-btn:active{transform:scale(.92);}

  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px;}
  .stat{background:linear-gradient(160deg,var(--panel),var(--panel-soft));border:1px solid var(--line);
    border-radius:var(--r-md);padding:16px 8px;text-align:center;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;}
  .stat::after{content:"";position:absolute;left:0;right:0;top:0;height:2px;opacity:.7;background:currentColor;}
  .stat .num{font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
  .stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:7px;font-weight:600;}
  .stat.ok{color:var(--green);} .stat.ok .num{color:var(--green);}
  .stat.warn{color:var(--gold);} .stat.warn .num{color:var(--gold);}
  .stat.acc{color:var(--accent);} .stat.acc .num{color:var(--accent);}

  .section-title{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.18em;
    margin:26px 4px 13px;font-weight:700;display:flex;align-items:center;gap:10px;}
  .section-title::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}

  /* Scope-Umschalter */
  .scope-row{display:flex;gap:8px;margin-bottom:6px;}
  .scope-btn{flex:1;min-height:48px;padding:12px 8px;border-radius:var(--r-md);border:1px solid var(--line);background:var(--panel-soft);
    color:var(--ink);font-weight:700;font-size:14px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}
  .scope-btn .sub{font-size:10px;color:var(--muted);font-weight:500;}
  .scope-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--accent-ink);border-color:transparent;}
  .scope-btn.active .sub{color:var(--accent-ink);opacity:.85;}

  .cat-row{display:flex;gap:9px;overflow-x:auto;padding:4px 2px 12px;margin:0 calc(var(--pad-x) * -0.5);
    padding-left:calc(var(--pad-x) * 0.5);padding-right:calc(var(--pad-x) * 0.5);
    -webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;scrollbar-width:none;}
  .cat-row::-webkit-scrollbar{height:0;}
  .cat-btn{flex:0 0 auto;min-height:42px;padding:10px 14px;border-radius:999px;border:1px solid var(--line);background:var(--panel-soft);
    color:var(--ink);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s;display:flex;align-items:center;gap:7px;scroll-snap-align:start;}
  .cat-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--accent-ink);border-color:transparent;}
  .cat-btn .cnt{font-size:11px;opacity:.7;background:rgba(255,255,255,.12);padding:1px 7px;border-radius:999px;}
  .cat-btn.active .cnt{background:rgba(0,0,0,.18);}

  .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .mode-card{background:linear-gradient(160deg,var(--panel),var(--panel-soft));border:1px solid var(--line);
    border-radius:var(--r-lg);padding:18px 15px;cursor:pointer;transition:transform .18s,border-color .18s,box-shadow .18s;
    text-align:left;position:relative;overflow:hidden;-webkit-user-select:none;user-select:none;box-shadow:var(--shadow-sm);}
  .mode-card:active{transform:scale(.97);border-color:var(--accent);}
  .mode-card .ic{font-size:26px;margin-bottom:11px;display:block;}
  .mode-card h3{margin:0 0 4px;font-size:15px;font-weight:700;}
  .mode-card p{margin:0;font-size:12.5px;color:var(--muted);line-height:1.45;}
  .mode-card .glow{position:absolute;top:-36px;right:-36px;width:110px;height:110px;border-radius:50%;opacity:.22;filter:blur(14px);}
  .mode-card.c1 .glow{background:var(--accent);} .mode-card.c2 .glow{background:var(--accent2);}
  .mode-card.c3 .glow{background:var(--green);} .mode-card.c4 .glow{background:var(--gold);}
  .mode-card.c5 .glow{background:#b07bff;} .mode-card.c6 .glow{background:var(--red);}

  .hidden{display:none !important;}

  /* Quiz */
  .qbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .qprog{flex:1;height:8px;background:var(--panel-soft);border-radius:999px;overflow:hidden;border:1px solid var(--line);}
  .qprog>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;}
  #q-counter{font-size:13px;color:var(--muted);font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;}
  #q-timer{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;padding:5px 11px;border-radius:999px;
    background:var(--panel-soft);border:1px solid var(--line);}
  #q-timer.danger{color:var(--red);border-color:var(--red);}
  .qcat{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.14em;font-weight:700;margin-bottom:8px;}
  .qtext{font-size:18px;line-height:1.45;font-weight:600;margin:0 0 8px;overflow-wrap:break-word;word-break:break-word;hyphens:auto;}
  .qimg-note{font-size:12.5px;color:var(--gold);background:rgba(255,213,107,.1);border:1px solid rgba(255,213,107,.25);
    padding:9px 12px;border-radius:var(--r-sm);margin:0 0 16px;line-height:1.45;}
  .opts{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
  .opt{display:flex;align-items:flex-start;gap:12px;min-height:48px;padding:14px 15px;border-radius:var(--r-md);border:1px solid var(--line);
    background:var(--panel-soft);cursor:pointer;font-size:16px;line-height:1.4;transition:.13s;text-align:left;color:var(--ink);
    overflow-wrap:break-word;word-break:break-word;}
  .opt>span:last-child{min-width:0;flex:1;}
  .opt:active{transform:scale(.99);}
  .opt .letter{flex:0 0 auto;width:26px;height:26px;border-radius:8px;background:var(--panel-2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted);}
  .opt.sel{border-color:var(--accent);background:var(--panel-2);}
  .opt.sel .letter{background:var(--accent);color:var(--accent-ink);border-color:transparent;}
  .opt.correct{border-color:var(--green);background:var(--green-bg);}
  .opt.correct .letter{background:var(--green);color:#04140a;border-color:transparent;}
  .opt.wrong{border-color:var(--red);background:var(--red-bg);}
  .opt.wrong .letter{background:var(--red);color:#fff;border-color:transparent;}
  .opt.disabled{pointer-events:none;}

  .feedback{padding:13px 15px;border-radius:var(--r-md);font-size:14px;line-height:1.5;margin-bottom:16px;border:1px solid;}
  .feedback.ok{background:var(--green-bg);border-color:var(--green);color:var(--green);}
  .feedback.no{background:var(--red-bg);border-color:var(--red);color:var(--red);}

  .btn{min-height:50px;padding:14px 18px;font-size:15px;font-weight:700;border:none;border-radius:var(--r-md);cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--accent-ink);transition:transform .12s,filter .12s;}
  .btn:active{transform:scale(.97);}
  .btn[disabled]{opacity:.4;pointer-events:none;}
  .ghost{min-height:48px;padding:12px 16px;font-size:14px;font-weight:600;border:1px solid var(--line);border-radius:var(--r-md);
    background:var(--panel-soft);color:var(--ink);cursor:pointer;transition:.13s;}
  .ghost:active{transform:scale(.97);}
  .ghost[disabled]{opacity:.4;pointer-events:none;}
  .row-btns{display:flex;gap:10px;flex-wrap:wrap;}

  /* Bottom nav (Quiz) */
  .qnav{position:fixed;left:0;right:0;bottom:0;z-index:50;
    padding:12px calc(var(--pad-x) + var(--sar)) calc(12px + var(--sab)) calc(var(--pad-x) + var(--sal));
    background:linear-gradient(0deg,var(--bg),var(--bg) 60%,transparent);display:none;}
  body.has-nav .qnav{display:block;}
  .qnav-inner{max-width:var(--content-max);margin:0 auto;display:flex;gap:10px;}
  .qnav .ghost{flex:0 0 auto;min-width:50px;font-size:20px;line-height:1;padding:12px;}
  .qnav .btn{flex:1;}

  /* Results */
  .result-hero{text-align:center;padding:30px 20px;border-radius:var(--r-xl);margin-bottom:20px;border:1px solid var(--line);
    background:linear-gradient(160deg,var(--panel),var(--panel-soft));}
  .result-hero .big{font-size:54px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
  .result-hero .verdict{font-size:18px;font-weight:700;margin-top:10px;}
  .result-hero.pass .big,.result-hero.pass .verdict{color:var(--green);}
  .result-hero.fail .big,.result-hero.fail .verdict{color:var(--red);}
  .result-hero .meta{font-size:13px;color:var(--muted);margin-top:8px;}

  .toast{position:fixed;left:50%;bottom:calc(20px + var(--sab));transform:translateX(-50%) translateY(20px);
    background:var(--panel-2);border:1px solid var(--line);color:var(--ink);padding:12px 18px;border-radius:999px;
    font-size:13px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.3s;z-index:200;max-width:90%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;line-height:1.6;}

  /* =======================================================================
     RESPONSIVE DESIGN — Mobile-First, gestaffelte Breakpoints
     Zielgeräte: kleine iPhones · Standard-iPhones · iPhone Pro Max ·
     iPad/Tablet · Desktop · Querformat. Nur Darstellung, keine Logik.
     ======================================================================= */

  /* ---- Sehr kleine Phones (iPhone SE / Mini, < 360px) ---- */
  @media (max-width:359px){
    .stat .num{font-size:21px;}
    .stat .lbl{font-size:9px;}
    .mode-card{padding:15px 12px;}
    .mode-card h3{font-size:14px;}
    .mode-card p{font-size:11.5px;}
    .qtext{font-size:16.5px;}
    .opt{font-size:15px;padding:13px 13px;}
    .scope-btn{font-size:13px;padding:11px 5px;}
  }

  /* ---- Kleine bis mittlere Phones (≤ 380px) ---- */
  @media (max-width:380px){
    .stat .num{font-size:22px;}
    .mode-card{padding:16px 13px;}
    .topbar{padding:12px 13px;gap:10px;}
    .brand h1{font-size:16px;}
  }

  /* ---- Standard-iPhones (390–430px, inkl. Pro Max) ---- */
  @media (min-width:390px) and (max-width:480px){
    .qtext{font-size:18.5px;}
    .opt{font-size:16.5px;}
    .stat .num{font-size:27px;}
  }

  /* ---- iPhone Pro Max & große Phones im Hochformat (≥ 430px) ----
     Etwas mehr Luft, größere Lesetexte, bessere Flächennutzung. */
  @media (min-width:430px) and (max-width:599px){
    .qtext{font-size:19px;line-height:1.5;}
    .opt{font-size:17px;padding:15px 16px;}
    .stat-grid{gap:12px;}
    .mode-grid{gap:13px;}
    .result-hero .big{font-size:60px;}
  }

  /* ---- Tablets / iPad Hochformat (≥ 600px) ---- */
  @media (min-width:600px){
    :root{ --content-max:720px; }
    .topbar{padding:16px 20px;margin-bottom:24px;}
    .logo{width:50px;height:50px;}
    .brand h1{font-size:19px;}
    .stat-grid{gap:14px;margin-bottom:22px;}
    .stat{padding:20px 10px;}
    .stat .num{font-size:30px;}
    .stat .lbl{font-size:11px;}
    .scope-btn{padding:14px 10px;font-size:15px;}
    .mode-grid{gap:14px;}
    .mode-card{padding:22px 20px;}
    .mode-card h3{font-size:16px;}
    .mode-card p{font-size:13px;}
    .mode-card .ic{font-size:28px;}
    .qtext{font-size:21px;line-height:1.5;}
    .opt{font-size:17px;padding:16px 18px;}
    .opt .letter{width:28px;height:28px;}
    .section-title{font-size:12px;margin:30px 4px 15px;}
    .result-hero{padding:38px 28px;}
    .result-hero .big{font-size:64px;}
    .feedback{font-size:15px;padding:15px 17px;}
  }

  /* ---- iPad Querformat / kleine Laptops (≥ 820px) ---- */
  @media (min-width:820px){
    :root{ --content-max:760px; }
    /* Modus-Karten dürfen mehr Platz nutzen, bleiben aber zweispaltig
       für klare, ruhige Optik (kein Feature-Wildwuchs). */
    .mode-card{padding:24px 22px;}
    .qtext{font-size:22px;}
  }

  /* ---- Desktop (≥ 1024px) ---- */
  @media (min-width:1024px){
    :root{ --content-max:800px; }
    /* Hover-Effekte nur auf echten Zeigergeräten – verhindert „klebende"
       Hover-Zustände auf Touch-Screens. */
  }
  @media (hover:hover) and (pointer:fine){
    .mode-card{transition:transform .18s,border-color .18s,box-shadow .18s;}
    .mode-card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--shadow);}
    .cat-btn:hover{border-color:var(--accent);}
    .scope-btn:hover{border-color:var(--accent);}
    .icon-btn:hover{border-color:var(--accent);background:var(--panel-2);}
    .ghost:hover{border-color:var(--accent);}
    .opt:not(.disabled):hover{border-color:var(--accent);}
    .btn:hover{filter:brightness(1.06);}
  }

  /* ---- Querformat auf Phones (niedrige Höhe, breit) ----
     Kompaktere vertikale Abstände, damit ohne Scrollen mehr sichtbar ist. */
  @media (max-height:500px) and (orientation:landscape){
    .topbar{margin-bottom:12px;padding:10px 14px;}
    .logo{width:38px;height:38px;}
    .stat-grid{margin-bottom:12px;gap:9px;}
    .stat{padding:11px 6px;}
    .stat .num{font-size:22px;}
    .section-title{margin:16px 4px 9px;}
    .qbar{margin-bottom:12px;}
    .qtext{font-size:17px;margin-bottom:10px;}
    .opts{gap:8px;margin-bottom:14px;}
    .opt{padding:11px 14px;}
    .mode-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
    .mode-card{padding:13px 14px;}
    .mode-card .ic{font-size:22px;margin-bottom:7px;}
    body.has-nav .app{padding-bottom:calc(var(--navh) + var(--sab) + 10px);}
    .qnav{padding-top:8px;}
  }

  /* ---- Reduzierte Bewegung respektieren ---- */
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;animation:none !important;}
  }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="logo">SBF</div>
    <div class="brand"><h1>SBF Trainer</h1><p id="brandSub">Binnen &amp; See</p></div>
    <button class="icon-btn" id="themeBtn" aria-label="Theme">&#9728;&#65039;</button>
  </div>

  <!-- HOME -->
  <div id="view-home">
    <div class="stat-grid">
      <div class="stat acc"><div class="num" id="s-answered">0</div><div class="lbl">Beantwortet</div></div>
      <div class="stat ok"><div class="num" id="s-acc">&ndash;</div><div class="lbl">Genauigkeit</div></div>
      <div class="stat warn"><div class="num" id="s-mastered">0</div><div class="lbl">Gemeistert</div></div>
    </div>

    <div class="section-title">Geltungsbereich</div>
    <div class="scope-row" id="scopeRow">
      <button class="scope-btn" data-scope="binnen">Binnen<span class="sub">Basis + Binnen</span></button>
      <button class="scope-btn" data-scope="see">See<span class="sub">Basis + See</span></button>
      <button class="scope-btn" data-scope="all">Alle<span class="sub">Komplett</span></button>
    </div>

    <div class="section-title">Kategorie</div>
    <div class="cat-row" id="catRow"></div>

    <div class="section-title">Lernen</div>
    <div class="mode-grid">
      <button class="mode-card c2" data-mode="sequential"><span class="glow"></span><span class="ic">&#128203;</span><h3>Der Reihe nach</h3><p>Alle Fragen der Auswahl in fester Reihenfolge.</p></button>
      <button class="mode-card c3" data-mode="random"><span class="glow"></span><span class="ic">&#128256;</span><h3>Zufall</h3><p>Alle Fragen gemischt, sofortiges Feedback.</p></button>
      <button class="mode-card c6" data-mode="wrong"><span class="glow"></span><span class="ic">&#127919;</span><h3>Falsche &uuml;ben</h3><p>Nur zuletzt falsch beantwortete Fragen.</p></button>
      <button class="mode-card c5" data-mode="flash"><span class="glow"></span><span class="ic">&#127183;</span><h3>Karteikarten</h3><p>Frage vorne, L&ouml;sung antippen.</p></button>
    </div>

    <div class="section-title">Pr&uuml;fung</div>
    <div class="mode-grid">
      <button class="mode-card c1" data-mode="examCat"><span class="glow"></span><span class="ic">&#9202;&#65039;</span><h3>Pr&uuml;fung (Kategorie)</h3><p>Aktuelle Kategorie, getimt, Auswertung am Ende. 75&nbsp;% zum Bestehen.</p></button>

},{"scope":"both","cat":"Manöver & Fahrverhalten","id":"x-35","n":35,"q":"Warum soll man möglichst gegen Strom und Wind anlegen?","o":["Weil sich das Fahrzeug dabei sicherer manövrieren lässt.","Weil dadurch Sog und Wellenschlag vermieden wird.","Weil dadurch Einflüsse von Wellen und Wassertiefe ausgeglichen werden.","Weil dies die Steuerwirkung der Schraube erhöht."],"a":[0]},{"scope":"both","cat":"Manöver & Fahrverhalten","id":"x-36","n":36,"q":"Wie verhält man sich beim Begegnen mit anderen Fahrzeugen in einem engen Fahrwasser?","o":["Geschwindigkeit herabsetzen und ausreichenden Passierabstand halten.","Geschwindigkeit erhöhen, um das Begegnungsmanöver zügig durchzuführen.","Das gegen den Strom fahrende Fahrzeug ist ausweichpflichtig.","Das mit dem Strom fahrende Fahrzeug hat aufzustoppen."],"a":[0]},{"scope":"both","cat":"Manöver & Fahrverhalten","id":"x-37","n":37,"q":"Welche Gefahren können entstehen, wenn ein kleines von einem größeren Fahrzeug überholt wird?","o":["Das kleinere Fahrzeug kann durch Stau, Sog oder Schwell aus dem Kurs laufen und kollidieren oder querschlagen, in flachen Gewässern auf Grund laufen.","Das größere Fahrzeug kann durch Stau, Sog oder Schwell aus dem Kurs laufen und kollidieren oder querschlagen, in flachen Gewässern auf Grund laufen.","Das kleinere Fahrzeug kann durch Stau, Sog oder Schwell aus dem Kurs laufen und kollidieren oder kentern, in flachen Gewässern extrem versetzt werden.","Das größere Fahrzeug kann durch Wellenbildung aus dem Kurs laufen und kollidieren oder querschlagen, in flachen Gewässern auf Grund laufen."],"a":[0]},{"scope":"both","cat":"Umwelt & Naturschutz","id":"x-38","n":38,"q":"Wo finden Sie Informationen über umweltfreundliche Farben, Lacke und Antifouling-Beschichtungen für Ihr Boot?","o":["Beim Umweltbundesamt.","Beim Bundesministerium für Digitales und Verkehr.","In der Sportbootführerscheinverordnung.","In der Sportbootvermietungsverordnung."],"a":[0]},{"scope":"both","cat":"Umwelt & Naturschutz","id":  Uhrzeigersinn.","Von achtern gesehen in Vorausfahrt Drehung des Propellers gegen den Uhrzeigersinn.","Von vorne gesehen in Rückwärtsfahrt Drehung des Propellers gegen den Uhrzeigersinn."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-45","n":45,"q":"Was ist unter einem linksdrehenden Propeller zu verstehen?","o":["Von achtern gesehen in Vorausfahrt Drehung des Propellers gegen den Uhrzeigersinn.","Von vorne gesehen in Vorausfahrt Drehung des Propellers gegen den Uhrzeigersinn.","Von achtern gesehen in Vorausfahrt Drehung des Propellers im Uhrzeigersinn.","Von vorne gesehen in Rückwärtsfahrt Drehung des Propellers im Uhrzeigersinn."],"a":[0]},{"scope":"both","cat":"Manöver & Fahrverhalten","id":"x-46","n":46,"q":"Was ist unter der indirekten Ruderwirkung (Radeffekt) des Propellers zu verstehen?","o":["Das seitliche Versetzen des Hecks.","Das Versetzen nach vorne.","Das Versetzen nach hinten.","Das seitliche Versetzen des Bugs."],"a":[0]},{"scope":"both","cat":"Manöver & Fahrverhalten","id":"x-47","n":47,"q":"Weshalb ist die Kenntnis der Propellerdrehrichtung von Bedeutung?","o":["Sie hilft beim Manövrieren.","Sie hilft beim Kurshalten.","Sie hilft beim Überholen.","Sie hilft beim Begegnen."],"a":[0]},{"scope":"both","cat":"Manöver & Fahrverhalten","id":"x-48","n":48,"q":"Welche Anlegeseite ist mit rechtsdrehendem Propeller empfehlenswert und warum?","o":["Die Backbordseite - der Radeffekt zieht das Fahrzeug an die Pier.","Die Steuerbordseite - der Radeffekt zieht das Fahrzeug an die Pier.","Die Steuerbord- oder Backbordseite je nach Ruderlage.","Es gibt keine empfehlenswerte Anlegeseite."],"a":[0]},{"scope":"both","cat":"Manöver & Fahrverhalten","id":"x-49","n":49,"q":"Was muss beim Tanken beachtet werden?","o":["Motor abstellen, keine elektrischen Schalter betätigen, Vorbereitung gegen das Überlaufen von Kraftstoff treffen, kein offenes Feuer.","Motor in Leerlaufstellung, keine elektrischen Schalter betätigen, Vorbereitung gegen das Überlaufen von Kraftstoff treffen, kein offenes Feuer.","Fenster schließen, keine elektrischen Schalter betätigen, Vorbereitung gegen das Überlaufen von Kraftstoff treffen, kein offenes Feuer.","Motor abstellen, Feuerlöscher bereithalten, Vorbereitung gegen das Überlaufen von Kraftstoff treffen, kein offenes Feuer."],"a":[0]},{"scope":"both","cat":"Manöver & Fahrverhalten","id":"x-50","n":50,"q":"Wodurch wird bei einem Fahrzeug mit Außenbordmotor und ohne Ruderanlage die Ruderwirkung erzielt?","o":["Durch Schraubenstrom und Richtung des Propellers.","Durch Schraubenstrom und Anstellwinkel des Propellers.","Durch den Schraubenwiderstand und Anstellwinkel des Propellers.","Durch den Schraubenwiderstand und Richtung des Propellers."],"a":[0]},{"scope":"both","cat":"Manöver & Fahrverhalten","id":"x-51","n":51,"q":"Weshalb setzt bei einem Fahrzeug mit Einbaumaschine und starrer Welle bei Aufnahme der Rückwärtsfahrt die Ruderwirkung erst relativ spät ein?","o":["Weil sie erst mit Anströmung des Ruderblattes einsetzt.","Weil sich durch den Radeffekt ein Unterdruck am Propeller entwickelt.","Durch den Abstand von Propeller und Ruderblatt.","Weil sich durch den Radeffekt ein Unterdruck am Ruder entwickelt."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-52","n":52,"q":"Während der Fahrt sollte die Maschinenanlage ständig überwacht werden. Worauf muss besonders geachtet werden?","o":["Motortemperatur, Öldruck, Ladekontrolle.","Kühlwasseraustritt, Drehzahlmesser, Keilriemenspannung.","Schraubendrehzahl, Getriebeöltemperatur, Öldruck.","Druck der Einspritzpumpe, Impellerpumpe, Ölpumpe."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-53","n":53,"q":"Die Temperatur der Antriebsmaschine überschreitet die zulässigen Grenzwerte. Was könnte die mögliche Ursache sein?","o":["Defektes Thermostat, defekte Impellerpumpe, geschlossenes Seeventil, zu niedriger Kühlwasserstand.","Zu viel Motoröl, defekte Impellerpumpe, geschlossenes Seeventil, zu niedriger Kühlwasserstand.","Defektes Thermostat, defekte Impellerpumpe, geschlossenes Seeventil, zu hohe Batteriespannung.","Defektes Thermostat, defekte Kupplung, geschlossenes Seeventil, zu niedriger Kühlwasserstand."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-54","n":54,"q":"Die Ladekontrolllampe erlischt nach dem Starten nicht. Was könnte die mögliche Ursache sein?","o":["Lichtmaschine bzw. Regler der Lichtmaschine defekt.","Zu hohe Motordrehzahl.","Keilriemen gerissen und hoher Stromverbrauch.","Anlasser ist nach dem Starten ausgefallen."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-55","n":55,"q":"Die Ölkontrollleuchte leuchtet nach dem Starten weiter. Was könnte die mögliche Ursache sein?","o":["Druckschalter bzw. Öldruckpumpe defekt.","Zu viel Motoröl im Motor.","FI-Schalter defekt.","Zu hohe Motordrehzahl."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-56","n":56,"q":"Der Motor ist gestartet worden. Was kann die Ursache sein, wenn nach dem Einkuppeln der Antriebswelle der Motor stehenbleibt?","o":["Blockierter Propeller.","Blockierte Kraftstoffzufuhr.","Verschmutzter Ölfilter.","Verschmutzter Luftfilter."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-57","n":57,"q":"Ein Außenborder mit gefülltem Tank bleibt während der Fahrt stehen. Was könnten die Ursachen sein?","o":["Belüftungsschraube geschlossen; verstopfte Kraftstoffleitung.","Ansaugdüsen zu groß bzw. zu klein.","Tankdeckel ist offen.","Schraube an der Welle lose."],"a":[0]},{"scope":"both","cat":"Umwelt & Naturschutz","id":"x-58","n":58,"q":"Welche Veröffentlichungen enthalten wichtige Regeln und Tipps für Wassersportler, Empfehlungen zur Ausrüstung von Sportbooten sowie Hinweise zu umweltgerechtem Verhalten auf dem Wasser?","o":["Nautische Publikationen wie „Sicherheit auf dem Wasser“ und „Sicher auf See\".","Verordnung über die Sicherung der Seefahrt und nautische Publikationen wie „Sicher auf See\".","Nautische Publikation wie „Sicherheit auf dem Wasser“ und Internationales Signalbuch.","Internationales Signalbuch und Verordnung über die Sicherung der Seefahrt."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-59","n":59,"q":"Unter welchen Voraussetzungen darf ein Sportboot mit Elektromotor ohne Fahrerlaubnis geführt werden?","o":["Die Antriebsleistung beträgt höchstens 7,5 Kilowatt Betriebsart S1 (Dauerbetrieb).","Es darf immer ohne Fahrerlaubnis geführt werden, unabhängig von der Antriebsleistung.","Bis zu einer Antriebsleistung von 11,03 Kilowatt Betriebsart S1 (Dauerbetrieb).","Es darf nie ohne Fahrerlaubnis geführt werden, unabhängig von der Antriebsleistung."],"a":[0]},{"scope":"both","cat":"Manöver & Fahrverhalten","id":"x-60","n":60,"q":"Welche Vorkehrungen sind für das längere Verlassen des Fahrzeugs zu treffen?","o":["Alle Seeventile schließen und den Hauptschalter des Bordnetzes ausschalten.","Kraftstoff- und Wassertank auffüllen und das Bordnetz aufladen.","Tagestank schließen und Kraftstofffilter entwässern.","Fahrzeug seefest hinterlassen und den Hafenmeister verständigen."],"a":[0]},{"scope":"both","cat":"Manöver & Fahrverhalten","id":"x-61","n":61,"q":"Wie ist ein enges Gewässer zu befahren, wenn man sich am Ufer festgemachten Fahrzeugen nähert?","o":["Verringerung der Geschwindigkeit, um schädlichen Sog und Wellenschlag zu vermeiden.","Beibehaltung der Geschwindigkeit, um durch Gleitfahrt schädlichen Sog und Wellenschlag auszuschließen.","Verringerung der Geschwindigkeit und nötigenfalls vom Rechtsfahrgebot abweichen.","Auf Höhe der festgemachten Fahrzeuge aufstoppen und überprüfen, dass kein Dritter behindert oder geschädigt wird."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-62","n":62,"q":"Wo sollen die Gasbehälter einer Flüssiggasanlage gelagert werden?","o":["Möglichst an Deck, geschützt vor Sonneneinstrahlung, sonst in einem besonders abgeschlossenen Raum für Gasbehälter, der in Bodenhöhe eine Öffnung nach außenbords hat.","Möglichst unten im Schiff, geschützt vor Sonneneinstrahlung, sonst in einem besonders abgeschlossenen Raum für Gasbehälter, der in Bodenhöhe eine Öffnung nach außenbords hat.","Möglichst auf dem Vorschiff, geschützt vor Sonneneinstrahlung, sonst in einem besonders abgeschlossenen Raum für Gasbehälter, der in Bodenhöhe eine Öffnung nach außenbords hat.","Möglichst an Deck, geschützt vor Sonneneinstrahlung, sonst in einem besonders abgeschlossenen Raum für Gasbehälter, der oben belüftet ist."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-63","n":63,"q":"Warum sind die Flüssiggase Propan und Butan an Bord besonders gefährlich?","o":["Beide Gase sind schwerer als Luft und bilden mit Luft ein explosives Gemisch.","Beide Gase sind leichter als Luft und bilden mit Luft ein explosives Gemisch.","Beide Gase sind schwerer als Wasser und bilden mit Wasser ein explosives Gemisch.","Beide Gase sind schwerer als Luft und bilden mit Wasser ein explosives Gemisch."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-64","n":64,"q":"Was ist zu tun, wenn Flüssiggas in das Innere des Bootes gelangt?","o":["Gaszuführung absperren und für Lüftung sorgen. Außerdem keine elektrischen Schalter betätigen und keinen Funk und keine Mobiltelefone benutzen.","Gasleitung entleeren und für Lüftung sorgen. Außerdem keine elektrischen Schalter betätigen und keine Telefone benutzen.","Gaszuführung absperren und für Lüftung sorgen. Außerdem keine elektrischen Schalter betätigen und per Telefon Hilfe holen.","Gasleitung entleeren und die Gasfreiheit mit dem Feuerzeug prüfen sowie über Funk oder Mobiltelefon Hilfe anfordern."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-65","n":65,"q":"Was ist vor Inbetriebnahme einer Flüssiggasanlage zu prüfen?","o":["Die Anlage muss abgenommen sein, Leitungen und Anschlüsse müssen dicht sein. Haupthahn und andere Absperrventile sind zu öffnen.","Die Anlage muss abgenommen sein, die Inbetriebnahme darf nur durch eine besonders geprüfte Person erfolgen.","Die Anlage muss abgenommen sein und jährlich überprüft werden. Die Inbetriebnahme darf nur durch eine besonders geprüfte Person erfolgen.","Die Abnahme der Anlage darf nicht länger als drei Jahre zurückliegen. Haupthahn und andere Absperrventile sind zu öffnen."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-66","n":66,"q":"Was ist zu beachten, wenn eine Flüssiggasanlage außer Betrieb gesetzt wird?","o":["Haupthahn und Absperrventile sind zu schließen.","Die Anlage ist gasfrei zu machen.","Gasflasche fachgerecht entsorgen.","Der Flüssiggasbehälter ist vollständig zu entleeren."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-67","n":67,"q":"Wie oft muss man aufblasbare Rettungsmittel warten lassen?","o":["Entsprechend der Herstellerangabe, mindestens alle 2 Jahre.","Jährlich und nach jedem Einsatz oder Übungsgebrauch.","Entsprechend der Herstellerangabe, mindestens alle 3 Jahre.","Jährlich, jeweils vor Beginn der Wassersportsaison."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-68","n":68,"q":"Welcher Feuerlöscher ist für Sportboote zweckmäßig und wie oft muss man einen Feuerlöscher überprüfen lassen?","o":["ABC-Pulver- und Schaumlöscher, mindestens alle 2 Jahre.","Feuerlöscher mit Löschschaum, mindestens einmal pro Jahr.","CO2-Feuerlöscher, mindestens alle 2 Jahre.","ABC-Pulverlöscher, mindestens einmal pro Jahr."],"a":[0]},{"scope":"both","cat":"Motor, Technik & Sicherheit","id":"x-69","n":69,"q":"Welche Maßnahmen muss man ergreifen, um einen Brand mit dem Feuerlöscher wirksam zu bekämpfen?","o":["Luftzufuhr verhindern, Feuerlöscher erst am Brandherd einsetzen und das Feuer möglichst von unten bekämpfen.","Rauchabzug sicherstellen und Feuerlöscher rechtzeitig einsetzen, dabei den Löschstrahl möglichst in die lodernden Flammen halten.","Luftzufuhr verhindern und den Feuerlöscher mit sparsamen Löschstrahlstößen einsetzen, dabei das Feuer möglichst von oben bekämpfen.","Handhabungshinweise durchlesen und den Feuerlöscher sofort einsetzen, dabei das Feuer möglichst von unten bekämpfen."],"a":[0]},{"scope":"both","cat":"Grundlagen, Recht & Verhalten","id":"x-70","n":70,"q":"Wie hat man sich nach einem Zusammenstoß zu verhalten?","o":["Hilfe leisten und so lange am Unfallort bleiben, bis ein weiterer Beistand nicht mehr erforderlich ist; alle erforderlichen Daten austauschen.","Hilfe leisten und so lange am Unfallort bleiben, bis ein weiterer Beistand nicht mehr erforderlich ist; die Wasserschutzpolizei benachrichtigen.","Hilfe leisten und so lange am Unfallort bleiben, bis ein weiterer Beistand nicht mehr erforderlich ist; Notsignal geben.","Hilfe leisten und so lange am Unfallort bleiben, bis ein weiterer Beistand nicht mehr erforderlich ist; Verschlusszustand herstellen."],"a":[0]},{"scope":"both","cat":"Grundlagen, Recht & Verhalten","id":"x-71","n":71,"q":"Welche Faktoren sind hauptsächlich für das Wettergeschehen, also für Wind und Niederschläge, ausschlaggebend?","o":["Luftdruckänderung, Luftfeuchtigkeit und Temperatur.","Luftdruckänderung, Sonneneinstrahlung und Höhenlage.","Luftdruckänderung, Luftfeuchtigkeit und Jahreszeit.","Luftdruckänderung, Tageszeit und Temperatur."],"a":[0]},{"scope":"both","cat":"Grundlagen, Recht & Verhalten","id":"x-72","n":72,"q":"In welcher Situation dürfen Notsignale gegeben werden?","o":["Wenn Gefahr für Leib oder Leben von Personen besteht und daher Hilfe benötigt wird.","Wenn Gefahr für Leib oder Leben von Personen besteht oder das Schiff nicht mehr sicher manövriert werden kann.","Wenn Gefahr für Leib oder Leben von Personen oder erhebliche Sachwerte besteht und daher Hilfe benötigt wird.","Wenn Gefahr für Leib oder Leben von Personen, erhebliche Sachwerte oder die maritime Umwelt besteht."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-73","n":73,"q":"Für welche Sportboote ist der Sportbootführerschein mit dem Geltungsbereich Binnenschifffahrtsstraßen vorgeschrieben?","o":["Für Sportboote von mehr als 11,03 kW (15 PS) Nutzleistung bei Verwendung eines Verbrennungsmotors bzw. 7,5 kW bei Verwendung eines Elektromotors Betriebsart S1 (Dauerbetrieb) und weniger als 20 m Länge.","Für Sportboote von weniger als 11,03 kW (15 PS) Nutzleistung bei Verwendung eines Verbrennungsmotors bzw. 7,5 kW bei Verwendung eines Elektromotors Betriebsart S1 (Dauerbetrieb) und mehr als 20 m Länge.","Für Sportboote von mehr als 11,03 kW (15 PS) Nutzleistung bei Verwendung eines Verbrennungsmotors bzw. 7,5 kW bei Verwendung eines Elektromotors Betriebsart S1 (Dauerbetrieb) und mehr als 20 m Länge.","Für Sportboote von weniger als 11,03 kW (15 PS) Nutzleistung bei Verwendung eines Verbrennungsmotors bzw. 7,5 kW bei Verwendung eines Elektromotors Betriebsart S1 (Dauerbetrieb) und weniger als 20 m Länge."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-74","n":74,"q":"Auf welchen Gewässern gilt der Sportbootführerschein mit dem Geltungsbereich Binnenschifffahrtsstraßen?","o":["Auf den Bundeswasserstraßen im Binnenbereich.","Auf allen Landesgewässern.","Auf den Bundeswasserstraßen und allen Landesgewässern.","Auf allen Seewasserstraßen."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-75","n":75,"q":"Aus welchen Gründen muss der Sportbootführerschein mit dem Geltungsbereich Binnenschifffahrtsstraßen entzogen werden?","o":["Bei fehlender Tauglichkeit oder fehlender Zuverlässigkeit.","Bei zweifelhafter Tauglichkeit wegen Alkoholmissbrauch.","Bei zweifelhafter Zuverlässigkeit aus Altersgründen.","Bei fehlender Zuverlässigkeit nach einer begangener Ordnungswidrigkeit."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-76","n":76,"q":"Was beinhaltet die allgemeine Sorgfaltspflicht?","o":["Vermeidung der Gefährdung von Menschenleben, von Beschädigungen an Fahrzeugen, Anlagen oder Ufern, Behinderung der Schifffahrt und Beeinträchtigung der Umwelt.","Gefährdung von Menschenleben, Beschädigungen an Fahrzeugen, Anlagen oder Ufern und Beeinträchtigung der Umwelt.","Es ist alles zu tun, was zur Vermeidung der Gefährdung von Menschenleben, Behinderung der Schifffahrt und Beeinträchtigung der Umwelt nötig ist.","Es ist alles zu tun, was zur Vermeidung von Beschädigungen an Fahrzeugen, Anlagen oder Ufern, Behinderung der Schifffahrt und Beeinträchtigung der Umwelt nötig ist."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-77","n":77,"q":"Unter welchen Umständen darf von den geltenden Bestimmungen über das Verhalten im Verkehr auf den Binnenschifffahrtsstraßen abgewichen werden?","o":["Bei unmittelbar drohender Gefahr für sich oder andere.","Bei unmittelbar bevorstehender Begegnung.","Bei unmittelbar bevorstehendem Überholvorgang.","Bei mittelbar drohender Gefahr für sich oder andere."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-78","n":78,"q":"Welche Anforderungen neben der körperlichen und geistigen Tauglichkeit und fachlichen Eignung muss der Führer eines Sportbootes auf Binnenschifffahrtsstraßen erfüllen, wenn die größte Nutzleistung der Antriebsmaschine 11,03 kW bei Verbrennungsmotoren bzw. 7,5 kW bei Elektromotoren Betriebsart S1 (Dauerbetrieb) oder weniger beträgt?","o":["Mindestalter 16 Jahre.","Nachweis der Zuverlässigkeit.","Mindestalter 14 Jahre.","Besitz eines Sportbootführerscheins mit dem Geltungsbereich Binnenschifffahrtsstraßen für Sportboote mit Antriebsmaschine oder eines gleichgestellten Befähigungszeugnisses."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-79","n":79,"q":"Welche Anforderungen neben der körperlichen und geistigen Tauglichkeit und fachlichen Eignung muss der Führer eines Sportbootes auf dem Rhein erfüllen, wenn die Nutzleistung der Antriebsmaschine mehr als 11,03 kW bei Verbrennungsmotoren bzw. 7,5 kW bei Elektromotoren Betriebsart S1 (Dauerbetrieb .","Eine Folge von mindestens 2 Tönen von je etwa einer viertel Sekunde Dauer und mit je einer viertel Sekunde Pause.","Eine Folge von mindestens 8 Tönen von je etwa einer viertel Sekunde Dauer und mit je einer viertel Sekunde Pause."],"a":[0]},{"scope":"binnen","cat":"Lichter, Sicht- & Schallzeichen","id":"b-169","n":169,"q":"Was bedeutet eine Folge sehr kurzer Töne?","o":["Gefahr eines Zusammenstoßes.","Achtung!","Fahrzeug ist manövrierunfähig.","Überholen nicht möglich."],"a":[0]},{"scope":"binnen","cat":"Lichter, Sicht- & Schallzeichen","id":"b-170","n":170,"q":"Welche Schallsignale bzw. Zeichen sind zu geben, wenn das Boot manövrierunfähig geworden ist?","o":["Vier kurze Töne. Bei Tag eine rote Flagge, bei Nacht ein rotes Licht im unteren Halbkreis schwenken.","Fünf kurze Töne. Bei Tag eine rote Flagge, bei Nacht ein rotes Licht im oberen Halbkreis schwenken.","Ein langer, vier kurze Töne. Bei Tag eine rote Flagge, bei Nacht ein rotes Licht setzen.","Eine Gruppe von kurzen und langen Tönen im Intervall geben. Bei Nacht ein rotes Blinklicht einschalten."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-171","n":171,"q":"Ein Fahrzeug zeigt an der Steuerbordseite seines Ruderhauses eine blaue Tafel mit weißem Funkellicht. Welche Bedeutung hat dieses Zeichen?","o":["Fahrzeuge begegnen sich an Steuerbord. Dieses Zeichen gilt nicht für Kleinfahrzeuge, verpflichtet aber zu erhöhter Aufmerksamkeit.","Fahrzeuge begegnen sich an Steuerbord. Dieses Zeichen gilt nur für Kleinfahrzeuge.","Fahrzeuge begegnen sich an Steuerbord. Dieses Zeichen braucht gar nicht beachtet zu werden.","Fahrzeuge begegnen sich an Steuerbord. Dieses Zeichen gilt auch für alle Kleinfahrzeuge."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-172","n":172,"q":"Ein Sportfahrzeug fährt hinter einem Fahrzeug, das nicht Kleinfahrzeug ist, in den Schleusenvorhafen ein. Aus der Schleusenkammer kommt ein Fahrzeug, das an Steuerbord eine blaue Tafel mit einem weißen Funkellicht zeigt. Was bedeutet dieses Zeichen?","o":["Das aus- und die einfahrenden Fahrzeuge passieren sich an der Steuerbordseite, das Kleinfahrzeug ist nur zu erhöhter Aufmerksamkeit verpflichtet.","Das aus- und die einfahrenden Fahrzeuge passieren sich an der Backbordseite, das Kleinfahrzeug ist nur zu erhöhter Aufmerksamkeit verpflichtet.","Das aus- und die einfahrenden Fahrzeuge passieren sich an der Steuerbordseite, das Kleinfahrzeug ist wartepflichtig.","Das aus- und die einfahrenden Fahrzeuge passieren sich an der Backbordseite, das Kleinfahrzeug hat Vorrang."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-173","n":173,"q":"Wo kann man von bestehenden Höchstgeschwindigkeiten auf den Binnenschifffahrtsstraßen Kenntnis erhalten?","o":["In der Binnenschifffahrtsstraßen-Ordnung, bei der Wasserstraßen- und Schifffahrtsverwaltung und der Wasserschutzpolizei.","In der Binnenschiffsuntersuchungsordnung, bei der Wasserstraßen- und Schifffahrtsverwaltung und der Wasserschutzpolizei.","In der Sportbootführerscheinverordnung, bei der Wasserstraßen- und Schifffahrtsverwaltung und der Wasserschutzpolizei.","In der Binnenschifferpatentverordnung, bei der Wasserstraßen- und Schifffahrtsverwaltung und der Wasserschutzpolizei."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-174","n":174,"q":"Wie ist ein Überholmanöver durchzuführen?","o":["Zügig überholen. Beteiligte Fahrzeuge nicht behindern. Verkehrslage und eventuelle Schallzeichen beachten. Ausreichend Abstand halten.","Zügig überholen. Gegebenenfalls das Fahrzeug stark beschleunigen, um schnell passieren zu können.","Zügig überholen; überholen nur auf der Steuerbordseite erlaubt, ausreichend Abstand halten.","Zügig überholen. Dicht am Ufer entlang fahren, eventuelle Schallzeichen müssen von Kleinfahrzeugen beachtet werden."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-175","n":175,"q":"Wann besteht die Gefahr eines Zusammenstoßes?","o":["Wenn sich zwei Fahrzeuge bei gleichbleibender Peilung einander nähern.","Wenn sich zwei Fahrzeuge einander nähern und sich der Kurs der Fahrzeuge nicht ändert.","Wenn sich zwei Fahrzeuge einander nähern und sich der Kurs eines Fahrzeuges ändert.","Wenn sich zwei Fahrzeuge einander nähern und beide Fahrzeuge ihren Kurs nach steuerbord ändern."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-176","n":176,"q":"Wie müssen Ausweichmanöver durchgeführt werden?","o":["Rechtzeitig, klar erkennbar und entschlossen.","Rechtzeitig, klar erkennbar und nach Steuerbord.","Rechtzeitig, klar erkennbar und nach Backbord.","Rechtzeitig, klar erkennbar und vorsichtig."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-177","n":177,"q":"Ein Kleinfahrzeug und ein Fahrzeug über 20 m Länge nähern sich auf kreuzenden Kursen. Es besteht die Gefahr eines Zusammenstoßes. Wer ist ausweichpflichtig?","o":["Ausweichpflichtig ist das Kleinfahrzeug.","Ausweichpflichtig ist das Fahrzeug über 20 m Länge.","Ausweichpflichtig ist das Fahrzeug, welches das andere an seiner Steuerbordseite sieht.","Ausweichpflichtig ist das Fahrzeug, welches das andere an seiner Backbordseite sieht."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-178","n":178,"q":"Welche Fahrzeuge in Fahrt führen nachts nur ein weißes Rundumlicht?","o":["Geschleppte oder längsseits gekuppelte Kleinfahrzeuge.","Kleinfahrzeuge mit Maschinenantrieb unter 20 m Länge.","Kleinfahrzeuge mit Maschinenantrieb und geschleppte Fahrzeuge.","Fahrzeuge die geschoben werden."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-179","n":179,"q":"Wie muss sich ein kreuzendes Kleinfahrzeug unter Segel am Wind in der Nähe eines Ufers gegenüber einem anderen Kleinfahrzeug verhalten?","o":["Es darf ein anderes Kleinfahrzeug, das sein steuerbordseitiges Ufer anhält, nicht zum Ausweichen zwingen.","Es darf ein anderes Kleinfahrzeug, das sein steuerbordseitiges Ufer verlässt, nicht zum Ausweichen zwingen.","Es darf ein anderes Kleinfahrzeug, das sein backbordseitiges Ufer verlässt, zum Ausweichen zwingen.","Es darf ein anderes Kleinfahrzeug, das sein steuerbordseitiges Ufer anhält, zum Ausweichen zwingen."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-180","n":180,"q":"Wer ist ausweichpflichtig bzw. wer ist nicht ausweichpflichtig?","o":["Das Fahrzeug unter Segel ist ausweichpflichtig.","Das Fahrzeug unter Segel ist nicht ausweichpflichtig.","Das Fahrzeug unter Maschinenantrieb ist ausweichpflichtig.","Beide Fahrzeuge sind ausweichpflichtig."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-181","n":181,"q":"Was hat der Schiffsführer eines Kleinfahrzeugs beim Begegnen mit Fahrzeugen, die nicht Kleinfahrzeuge sind, zu beachten?","o":["Kleinfahrzeuge sind gegenüber Fahrzeugen, die nicht Kleinfahrzeuge sind, ausweichpflichtig. Sie müssen für deren Kurs und zum Manövrieren notwendigen Raum lassen.","Kleinfahrzeuge sind gegenüber anderen Fahrzeugen, die nicht Kleinfahrzeuge sind, nicht ausweichpflichtig.","Kleinfahrzeuge sind gegenüber Fahrzeugen, die nicht Kleinfahrzeuge sind, bei der Begegnung gleichgestellt.","Kleinfahrzeuge sind gegenüber Fahrzeugen, die nicht Kleinfahrzeuge sind, ausweichpflichtig. Sie brauchen aber keinen besonderen Raum zum Manövrieren frei zu geben."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-182","n":182,"q":"Von Backbord kommend kreuzt ein Fahrzeug unter Segel mit einem schwarzen Kegel, Spitze nach unten, den Kurs eines Fahrzeuges mit Maschinenantrieb. Wer ist ausweichpflichtig?","o":["Das Fahrzeug unter Segel mit einem schwarzen Kegel ist ausweichpflichtig.","Das Fahrzeug ohne Segel ist ausweichpflichtig.","Das Fahrzeug unter Segel mit einem schwarzen Kegel ist nicht ausweichpflichtig.","Beide Fahrzeuge sind ausweichpflichtig."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-183","n":183,"q":"Zwei Kleinfahrzeuge unter Segel A und B liegen auf Kollisionskurs; A s stromab, Großsegel an Steuerbord. Backbord querab kommt ein grünes Seitenlicht eines Bootes B immer näher, das kein Topplicht führt. Wer ist ausweichpflichtig?","o":["Das Kleinfahrzeug A ist ausweichpflichtig. Ein Boot mit Wind von Backbord muss ausweichen, wenn es nicht klar ausmachen kann, ob das luvseitige Boot den Wind von Steuerbord hat.","Das Kleinfahrzeug A ist ausweichpflichtig. Ein Boot mit Wind von Steuerbord muss ausweichen, wenn es nicht klar ausmachen kann, ob das luvseitige Boot den Wind von Backbord hat.","Boot B ist ausweichpflichtig, weil es sich bei Fahrzeug A um ein Kleinfahrzeug unter Segel handelt, das den Wind von Backbord hat.","Boot B ist ausweichpflichtig, weil es sich um ein Kleinfahrzeug handelt und Kleinfahrzeuge anderen Kleinfahrzeugen unter Segel ausweichen müssen."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-188","n":188,"q":"Der seitliche Abstand zwischen den Booten A, B und C verringert sich ständig. Welches Boot kann seinen Kurs beibehalten?","o":["Boot A, weil leeseitig.","Boot A, weil luvseitig.","Boot B, weil leeseitig.","Boot C, weil leeseitig."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-189","n":189,"q":"Wer ist wem gegenüber kurshaltepflichtig?","o":["A gegenüber B und C, B gegenüber C.","C gegenüber A und B, B gegenüber A.","B gegenüber C und A, A gegenüber C.","A gegenüber B und C, C gegenüber B."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-190","n":190,"q":"Was ist vorrangig zu beachten, wenn eine Jolle gekentert ist und sie nicht wieder aufgerichtet werden kann?","o":["Vollständigkeit der Crew überprüfen, gegebenenfalls Hilfe leisten. Am Boot festhalten oder gegebenenfalls aufs Boot legen, Hilfe abwarten.","Sofort vorgeschriebene Notsignale geben, mit allen Mitteln versuchen, das Fahrzeug aus dem Fahrwasser zu bringen.","Auf das gekenterte Boot steigen und sich ruhig verhalten, um Wärmeverlust zu minimieren. Sollte das nicht möglich sein, ans benachbarte Ufer schwimmen und Hilfe holen.","Rettungswesten anlegen und mit geeigneten Mitteln Hilfe herbeiholen. Gegebenenfalls Segel bergen."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-191","n":191,"q":"Ein Segelboot gerät in das Feld einer Segelregatta, ohne selbst Teilnehmer zu sein. Welche Ausweichregeln sind zu beachten?","o":["Die der Binnenschifffahrtsstraßen-Ordnung.","Die der Wettsegelbestimmungen.","Gegenüber Regattateilnehmern, die der Wettfahrtregeln, gegenüber anderen Fahrzeugen die der Binnenschifffahrtsstraßen- Ordnung.","Fahrzeuge, die an einer Regatta teilnehmen, müssen unbeteiligten Fahrzeugen ausweichen."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-192","n":192,"q":"Ein Kleinfahrzeug unter Segel kreuzt nachts das Fahrwasser. An Backbord tauchen die nachstehenden Lichter eines Fahrzeugs auf, das in spitzem Winkel den Kurs des Kleinfahrzeugs unter Segel kreuzen will. Was bedeuten diese Lichter?","o":["Kleinfahrzeug mit Maschinenantrieb.","Frei fahrende Fähre.","Schubverband von vorne.","Geschlepptes Kleinfahrzeug."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-193","n":193,"q":"Ein Kleinfahrzeug unter Segel kreuzt nachts das Fahrwasser. An Backbord tauchen die nachstehenden Lichter eines Fahrzeugs auf, das in spitzem Winkel den Kurs des Kleinfahrzeugs unter Segel kreuzen will. Wer ist ausweichpflichtig?","o":["Kleinfahrzeug mit Maschinenantrieb.","Kleinfahrzeug unter Segel.","Kleinfahrzeug, welches das Andere auf der Backbordseite hat.","Beide sind ausweichpflichtig."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-194","n":194,"q":"Ein Kleinfahrzeug unter Segel und mit Maschinenantrieb kreuzt nachts stromauf. Ein Fahrzeug kommt entgegen, das nur ein weißes Licht führt. Was bedeutet dieses Licht?","o":["Kleinfahrzeug ohne Maschinenantrieb.","Kleinfahrzeug mit Maschinenantrieb.","Kleinfahrzeug unter Segel.","Kleinfahrzeug unter Segel mit Maschinenantrieb."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-195","n":195,"q":"Ein Kleinfahrzeug unter Segel kreuzt nachts im Fahrwasser. Von achtern kommt ein Fahrzeug, das eine Zweifarbenlaterne und ein Topplicht führt. Was bedeuten diese Lichter?","o":["Kleinfahrzeug mit Maschinenantrieb.","Kleinfahrzeug ohne Maschinenantrieb.","Kleinfahrzeug unter Segel.","Kleinfahrzeug unter Segel mit Maschinenantrieb."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-196","n":196,"q":"Was bedeuten nachts auf einer Binnenschifffahrtsstraße die nachstehenden Lichter?","o":["Sog und Wellenschlag vermeiden.","Keine Durchfahrt für Kleinfahrzeuge.","Sperrung der Schifffahrt.","Durchfahrt für Kleinfahrzeuge."],"a":[0]},{"scope":"binnen","cat":"Ausweichen & Begegnung","id":"b-197","n":197,"q":"Wo ist die Geschwindigkeit zu vermindern, um Sog und Wellenschlag zu vermeiden?","o":["Vor Hafeneinmündungen, an Lade-, Lösch- und Liegeplätzen, in der Nähe nicht frei fahrender Fähren, auf gekennzeichneten Strecken, in der Nähe schwimmender Geräte bei der Arbeit.","Vor Einmündungen, an Lade-, Lösch- und Liegeplätzen, in der Nähe nicht frei fahrender Fähren, auf gekennzeichneten Strecken, in der Nähe schwimmender Geräte bei der Arbeit.","Vor Hafeneinmündungen, an Lade-, Lösch- und Liegeplätzen, in der Nähe frei fahrender Fähren, auf gekennzeichneten Strecken, in der Nähe schwimmender Geräte bei der Arbeit.","Vor Hafeneinmündungen, an Lade-, Lösch- und Liegeplätzen, in der Nähe nicht frei fahrender Fähren, auf gekennzeichneten Strecken, in der Nähe schwimmender Schifffahrtszeichen."],"a":[0]},{"scope":"binnen","cat":"Tafelzeichen Binnen","id":"b-198","n":198,"q":"Was bedeutet dieses Tafelzeichen?","o":["Vorgeschriebene Fahrtrichtung.","Fahrtrichtung nach links verboten.","Vorgeschriebene Fahrtrichtung nur für Kleinfahrzeuge.","Empfohlene Fahrtrichtung."],"a":[0]},{"scope":"binnen","cat":"Tafelzeichen Binnen","id":"b-199","n":199,"q":"Welche Bedeutung hat das nachstehende Tafelzeichen, wenn das rote Licht leuchtet?","o":["Verbot der Einfahrt in einen Hafen oder eine Nebenwasserstraße.","Verbot des Überholens auf dem Streckenabschnitt.","Achtung Doppelschleuse, linke Kammer gesperrt.","Achtung Ausfahrt aus Hafen oder Nebenfahrwasser."],"a":[0]},{"scope":"binnen","cat":"Tafelzeichen Binnen","id":"b-200","n":200,"q":"Was bedeutet dieses Tafelzeichen?","o":["10 km/h Höchstgeschwindigkeit gegenüber dem Ufer.","10 km/h Höchstgeschwindigkeit gegenüber der Strömung.","10 km/h Höchstgeschwindigkeit für Kleinfahrzeuge.","10 km/h für größere Fahrzeuge."],"a":[0]},{"scope":"binnen","cat":"Tafelzeichen Binnen","id":"b-201","n":201,"q":"Was bedeutet dieses Tafelzeichen?","o":["Gebot: Besondere Vorsicht walten lassen.","Gebot: Geradeaus zu fahren.","Gebot: Achtungssignal geben.","Gebot: Vor dem Schild anhalten."],"a":[0]},{"scope":"binnen","cat":"Tafelzeichen Binnen","id":"b-202","n":202,"q":"Was bedeutet dieses Tafelzeichen?","o":["Wendeverbot.","Verbotene Fahrtrichtung rechts oder links.","Verbote in beiden angezeigten Richtungen zu fahren.","Wendeverbot in der Mitte des Fahrwassers."],"a":[0]},{"scope":"binnen","cat":"Tafelzeichen Binnen","id":"b-203","n":203,"q":"Was bedeutet dieses Tafelzeichen?","o":["Empfohlener Wendeplatz. Stillliegen für alle Fahrzeuge verboten.","Empfohlener Wendeplatz. Stillliegen von Kleinfahrzeugen erlaubt.","Vorgeschriebener Wendeplatz. Stillliegen für alle Fahrzeuge verboten.","Vorgeschriebener Wendeplatz. Stillliegen von Kleinfahrzeugen erlaubt."],"a":[0]},{"scope":"binnen","cat":"Tafelzeichen Binnen","id":"b-204","n":204,"q":"Was bedeutet dieses Tafelzeichen?","o":["Wehr.","Hubbrücke.","Schleuse.","Sicherheitstor."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-205","n":205,"q":"Welche Sichtbeeinträchtigungen führen zu unsichtigem Wetter?","o":["Nebel, Schneefall, starker Regen.","Dunkelheit, Nebel, Schneefall, starker Regen.","Nacht, Schneefall, starker Regen.","Dämmerung, Nebel, Schneefall, starker Regen."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-206","n":206,"q":"Wie muss ein Fahrzeug ausgerüstet sein, um bei unsichtigem Wetter zu fahren?","o":["Mit einer für die Binnenschifffahrt zugelassenen funktionsfähigen Radaranlage und einer Sprechfunkanlage für den Binnenschifffahrtsfunk.","Mit einer für die Binnenschifffahrt zugelassenen funktionsfähigen Radaranlage und einer Sprechfunkanlage ohne ATIS.","Mit einer für die Binnenschifffahrt zugelassenen funktionsfähigen Radaranlage und einer Sprechfunkanlage für den Seefunkdienst.","Mit einer Radaranlage ohne Wendeanzeiger und einer Sprechfunkanlage für den Binnenschifffahrtsfunk."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-207","n":207,"q":"Was ist zu beachten, wenn während der Fahrt unsichtiges Wetter eintritt?","o":["Auf bestimmten Wasserstraßen ist ohne Radar und Sprechfunk die Fahrt unverzüglich einzustellen.","Auf allen Wasserstraßen ist ohne Radar und Sprechfunk die Fahrt unverzüglich einzustellen.","Auf bestimmten Wasserstraßen ist ohne Radar und AIS-- die Fahrt unverzüglich einzustellen.","Auf allen Wasserstraßen ist ohne Radar und ECDIS die Fahrt unverzüglich einzustellen."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-208","n":208,"q":"Welchen Vorteil bietet ein Radarreflektor auf einem Sportboot?","o":["Bessere Erkennbarkeit des Sportbootes auf Radarbildschirmen.","Bessere Erkennbarkeit des Sportbootes bei Nacht.","Bessere Erkennbarkeit des Sportbootes bei Taglicht.","Bessere Erkennbarkeit des Sportbootes bei unsichtigem Wetter."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-209","n":209,"q":"Welche technische Einrichtung gegen einen Stromschlag muss in der Landstromversorgung unbedingt installiert sein?","o":["Ein Fehlerstromschutzschalter.","Ein geringer Ladungsstrom ist ungefährlich.","Ein Überspannungsschutz.","Ein Schutzkleinspannungsschalter."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-210","n":210,"q":"Welches Schallsignal ist zu geben, wenn in einer Notsituation Hilfe gebraucht wird?","o":["Wiederholte lange Töne geben oder Gruppen von Glockenschlägen.","Wiederholte kurze Töne geben, keine Glockenschläge.","Einen langen Ton geben, vereinzelt Glockenschläge.","Drei kurze Töne geben, keine Glockenschläge."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-211","n":211,"q":"Welche Bedeutung hat am Tag das Kreisen einer roten Flagge auf einem Wasserfahrzeug?","o":["Ein in Not befindliches Fahrzeug, das durch Sichtzeichen Hilfe herbeirufen will.","Ein manövrierbehindertes Fahrzeug, das durch Sichtzeichen Hilfe herbeirufen will.","Keine Bedeutung für den durchgehenden Schiffsverkehr.","Schützenswertes Fahrzeug, Vermeidung von Sog und Wellenschlag."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-212","n":212,"q":"Welche Notsignale kann ein Segelsurfer auf Binnenschifffahrtsstraßen geben?","o":["Kreisförmiges Schwenken der Arme oder eines Gegenstandes.","Kreisförmiges Schwenken einer grünen Flagge, die mit anderen Zeichen nicht verwechselt werden kann.","Wiederholt lange Gruppen von Glockenschlägen.","Kreisförmiges Schwenken der Arme ist zu vermeiden, das Surfsegel ist möglichst senkrecht zu stellen."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-213","n":213,"q":"Was ist mit Abfällen jeglicher Art zu tun, die an Bord anfallen?","o":["An Bord sammeln und an Land in den entsprechenden Abfallsammelbehältern umweltgerecht entsorgen.","An Bord sammeln und bei einer Liegestelle an Land stellen.","An Bord sammeln und nur in geschlossenen Behältern über Bord werfen.","An Bord sammeln. Die Abgabe ist an jeder Schleuse möglich."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-214","n":214,"q":"Wem darf der Schiffsführer das Ruder eines motorisierten Sportbootes überlassen?","o":["Einer Person, die mindestens 16 Jahre alt, sowie körperlich und geistig geeignet ist.","Einer Person, die mindestens 18 Jahre alt, sowie körperlich und geistig geeignet ist.","Einer Person, die mindestens 14 Jahre alt, sowie körperlich und geistig geeignet ist.","Einer Person jeden Alters, die körperlich und geistig geeignet ist."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-215","n":215,"q":"Wie müssen Abfälle entsorgt werden?","o":["Es dürfen keinerlei Abfälle ins Wasser gelangen, Fäkalien und Öle sind an Land zu entsorgen.","Nur Abfälle, die die Umwelt nicht gefährden, dürfen 300 m vom Ufer ins Wasser eingeleitet werden.","Auf Seen dürfen keine Abfälle ins Wasser gelangen, auf Binnenschifffahrtsstraßen gibt es Sonderregelungen.","Alle Schiffe müssen mit Fäkalientanks ausgerüstet sein und geeignete Behältnisse für die getrennte Aufnahme von Abfällen an Bord haben."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-216","n":216,"q":"Was ist beim Neuanstrich des Unterwasserschiffs und bei der Entfernung des alten Anstrichs zu beachten?","o":["Der Arbeitsbereich ist großzügig abzudecken und der anfallende Abfall ist als Sondermüll zu behandeln und entsprechend zu entsorgen.","Es dürfen nur Unterwasseranstriche verwendet werden, deren Umweltverträglichkeit an der EU-Kennzeichnung erkenntlich ist.","Es sind bei Arbeiten mit Unterwasseranstrichen die Richtlinien der Schiffsuntersuchungskommission zu beachten.","Unterwasserarbeiten dürfen nur von zertifizierten Fachbetrieben, nach den Bestimmungen des Umweltschutzes ausgeführt werden."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-217","n":217,"q":"Was ist bei Sturmwarnung vom Schiffsführer eines Sportbootes unter Segel auf einem größeren Gewässer zu veranlassen?","o":["Rettungsweste anlegen. Segel bergen, versuchen einen Hafen oder eine geschützte Bucht anzulaufen.","Rettungsweste anlegen. Alle Segel setzen, versuchen, einen Hafen oder eine geschützte Bucht anzulaufen.","Rettungsweste bereit halten. Segel bergen, versuchen, einen Hafen oder eine geschützte Bucht anzulaufen.","Rettungsweste anlegen. Segel setzen, versuchen die Gewässermitte anzulaufen."],"a":[0]},{"scope":"binnen","cat":"Fahrwasser, Tonnen & Bezeichnung","id":"b-218","n":218,"q":"Welche Fahrrinnenseite hat ein Talfahrer an seiner Backbordseite?","o":["Die linke Fahrrinnenseite, gekennzeichnet durch grüne Spitztonnen oder Schwimmstangen.","Die rechte Fahrrinnenseite, gekennzeichnet durch rote Stumpftonnen oder Schwimmstangen.","Die linke Fahrrinnenseite, gekennzeichnet durch rote Stumpftonnen oder Schwimmstangen.","Die rechte Fahrrinnenseite, gekennzeichnet durch grüne Spitztonnen oder Schwimmstangen."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-219","n":219,"q":"Mit welcher Wetterentwicklung ist bei schnellem und stetig fallendem Luftdruck zu rechnen?","o":["Schlechtes Wetter, Starkwind oder Sturm.","Besseres Wetter, steigende Temperatur.","Schlechtes Wetter ist nicht zu erwarten.","Besseres Wetter, Sonne."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-220","n":220,"q":"Welches Wetter ist zu erwarten, wenn der Luftdruck langsam aber stetig steigt?","o":["Besseres Wetter, Sonne.","Besseres Wetter, steigende Temperatur.","Schlechtes Wetter ist nicht zu erwarten.","Schlechtes Wetter, Starkwind oder Sturm."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-221","n":221,"q":"Wo darf auf Binnenschifffahrtsstraßen Wasserski gelaufen werden?","o":["Nur in durch Tafelzeichen freigegebenen Bereichen.","Außerhalb des Fahrwassers.","Außerhalb der Fahrrinne.","Überall, ohne die Schifffahrt zu gefährden."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-222","n":222,"q":"Zu welcher Tageszeit und bei welchen Sichtweiten darf auf den erlaubten Gewässerabschnitten Wasserski gelaufen werden?","o":["Sonnenaufgang bis -untergang, Sicht 1 000 m und mehr.","Sonnenaufgang bis -untergang, Sicht 1 500 m und mehr.","Sonnenaufgang bis -untergang, Sicht 500 m und mehr.","Sonnenaufgang bis -untergang, Sicht 300 m und mehr."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-223","n":223,"q":"Wie muss sich der Wasserskiläufer bei der Vorbeifahrt an Fahrzeugen, Schwimmkörpern oder Badenden verhalten?","o":["Er muss im Kielwasser des Zugbootes bleiben.","Er darf bis zu 10 m beiderseits außerhalb des Kielwassers fahren.","Er darf bis zu 5 m beiderseits außerhalb des Kielwassers fahren.","Er muss uferseitig des Kielwassers fahren."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-224","n":224,"q":"Unter welchen Voraussetzungen darf außerhalb der ausgewiesenen Strecken/Wasserflächen Wassermotorrad gefahren werden?","o":["Bei Touren- und Wanderfahrten mit klarem Geradeauskurs.","Bei großen Sonderveranstaltungen außerhalb der Fahrrinne.","Wenn kein anderer Verkehrsteilnehmer behindert wird.","Ab Hochwassermarke I nur im Fahrwasser."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-225","n":225,"q":"Wie hat sich der Führer eines Wassermotorrades außerhalb der ausgewiesenen Strecken/Wasserflächen zu verhalten?","o":["Klaren Geradeauskurs fahren.","Im Abstand von 10 m zum Ufer fahren.","Im Abstand von 10 m außerhalb des Tonnenstrichs fahren.","Am Rande der Fahrrinne fahren."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-226","n":226,"q":"Auf welchen Gewässern ist die Fahrerlaubnis für Sportboote unter Segeln erforderlich?","o":["Auf bestimmten Wasserstraßen in Berlin und Brandenburg.","Auf allen Landesgewässern.","Auf den Binnenschifffahrtsstraßen und allen Landesgewässern.","Auf allen deutschen Wasserstraßen."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-227","n":227,"q":"Weshalb muss sich der Schiffsführer vor dem Befahren fremder Gewässer über die dort geltenden Vorschriften informieren?","o":["Um die jeweils geltenden Vorschriften einhalten zu können.","Da diese auf Landesgewässern grundsätzlich inhaltlich abweichen.","Da diese auf Bundesgewässern grundsätzlich inhaltlich abweichen.","Weil die jeweils geltenden Vorschriften wichtige Informationen über die Brückendurchfahrtshöhen enthalten."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-228","n":228,"q":"Welcher Befähigungsnachweis berechtigt zum Führen eines Sportbootes bis zu einer Länge von 25 m auf dem Rhein?","o":["Das Sportpatent.","Das Sportschifferzeugnis.","Der Sportbootführerschein mit dem Geltungsbereich Binnenschifffahrtsstraßen.","Der Sportbootführerschein mit dem Geltungsbereich Seeschifffahrtsstraßen."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-229","n":229,"q":"Welcher Befähigungsnachweis berechtigt zum Führen eines Sportbootes mit einer Länge von 20 m bis 25 m auf den Binnenschifffahrtsstraßen außerhalb des Rheins?","o":["Das Sportschifferzeugnis oder das Sportpatent.","Der Sportbootführerschein mit dem Geltungsbereich Binnenschifffahrtsstraßen.","Der Sportbootführerschein mit dem Geltungsbereich Seeschifffahrtsstraßen.","Der Sportbootführerschein mit dem Geltungsbereich Binnenschifffahrtsstraßen zum Führen von Sportbooten mit Antriebsmaschine oder das Sportpatent."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-230","n":230,"q":"Wo sind umfangreiche Hinweise auf die Binnenschifffahrtsstraßen und deren Grenzen zu finden?","o":["Im Teil II der Binnenschifffahrtsstraßen-Ordnung.","Im Teil I der Binnenschifffahrtsstraßen-Ordnung.","In der Binnenschiffsuntersuchungsordnung.","In der Kleinfahrzeugkennzeichenverordnung."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-231","n":231,"q":"Was ist bei der Ausübung des Wassersports auf Gewässern außerhalb der Bundeswasserstraßen (z. B. Landeswasserstraßen, kommunale und private Gewässer) zu beachten?","o":["Es ist gegebenenfalls die Genehmigung des Eigentümers einzuholen sowie die jeweilige Befahrensordnung zu beachten.","Es ist immer die Genehmigung des Eigentümers einzuholen sowie die jeweilige Befahrensordnung zu beachten.","Es ist immer die Genehmigung des Wasserstraßen- und Schifffahrtsamtes einzuholen sowie die jeweilige Befahrensordnung zu beachten.","Es ist gegebenenfalls die Genehmigung des Eigentümers einzuholen sowie die Binnenschifffahrtsstraßen-Ordnung zu beachten."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-232","n":232,"q":"Welche Kennzeichnungsarten für Sportboote gibt es?","o":["Amtliche Kennzeichen und amtlich anerkannte Kennzeichen.","Nur amtliche Kennzeichen.","Nur amtlich anerkannte Kennzeichen.","Kennzeichen gemäß Konformitätserklärung (CE-Zeichen)."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-233","n":233,"q":"Welche Stelle ist für die Zuteilung eines amtlichen Kennzeichens für Sportboote zuständig?","o":["Jedes Wasserstraßen- und Schifffahrtsamt.","Der Deutsche Motoryachtverband.","Der Deutsche Segler-Verband.","Der Allgemeine Deutsche Automobilclub."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-234","n":234,"q":"Woraus bestehen die amtlich anerkannten Kennzeichen?","o":["Nummer des Internationalen Bootsscheins, gefolgt vom Kennbuchstaben für die ausstellende Organisation.","Nummer des Binnenschiffsregisters, gefolgt vom Kennbuchstaben für die ausstellende Organisation.","Nummer des Seeschiffsregisters, gefolgt vom Kennbuchstaben für die ausstellende Organisation.","Die europäische Schiffsnummer, gefolgt vom Kennbuchstaben für die ausstellende Organisation."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-235","n":235,"q":"Welche Stellen sind für die Zuteilung eines amtlich anerkannten Kennzeichens für Sportboote zuständig?","o":["Der Deutsche Motoryachtverband, der Deutsche Segler-Verband, der Allgemeine Deutsche Automobilclub.","Die Wasserstraßen- und Schifffahrtsämter.","D d muss an der Steuerbordseite des Schiffes passiert werden.","Sie befindet sich auf der rechten Fahrrinnenseite und muss an der Backbordseite des Schiffes passiert werden.","Sie befindet sich auf der linken Fahrrinnenseite und muss an der Steuerbordseite des Schiffes passiert werden.","Sie befindet sich auf der linken Fahrrinnenseite und muss an Backbordseite des Schiffes passiert werden."],"a":[0]},{"scope":"binnen","cat":"Fahrwasser, Tonnen & Bezeichnung","id":"b-240","n":240,"q":"Ein Fahrzeug fährt zu Berg. Voraus liegt eine rote Tonne. Auf welcher Fahrrinnenseite befindet sich diese Tonne und an welcher Schiffsseite muss diese Tonne passiert werden?","o":["Sie befindet sich auf der rechten Fahrrinnenseite und muss an der Backbordseite des Schiffes passiert werden.","Sie befindet sich auf der rechten Fahrrinnenseite und muss an der Steuerbordseite des Schiffes passiert werden.","Sie befindet sich auf der linken Fahrrinnenseite und muss an der Backbordseite des Schiffes passiert werden.","Sie befindet sich auf der linken Fahrrinnenseite und muss an der Steuerbordseite des Schiffes passiert werden."],"a":[0]},{"scope":"binnen","cat":"Fahrwasser, Tonnen & Bezeichnung","id":"b-241","n":241,"q":"Ein Fahrzeug fährt in der Fahrrinne gegen den Strom. Voraus liegt eine grüne Tonne. Auf welcher Fahrrinnenseite befindet sich diese Tonne und an welcher Schiffsseite muss diese Tonne passiert werden?","o":["Sie befindet sich auf der linken Fahrrinnenseite und muss an der Steuerbordseite des Schiffes passiert werden.","Sie befindet sich auf der rechten Fahrrinnenseite und muss an der Steuerbordseite des Schiffes passiert werden.","Sie befindet sich auf der linken Fahrrinnenseite und muss an der Backbordseite des Schiffes passiert werden.","Sie befindet sich auf der rechten Fahrrinnenseite und muss an der Backbordseite des Schiffes passiert werden."],"a":[0]},{"scope":"binnen","cat":"Fahrwasser, Tonnen & Bezeichnung","id":"b-242","n":242,"q":"Welche Funktion haben gelbe Tonnen m

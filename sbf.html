/* ===== Scope / Kategorie ===== */
function scopeMatch(q){
  if(state.scope==="all")return true;
  if(q.scope==="both")return true;
  return q.scope===state.scope;
}
function scopePool(){return QUESTIONS.filter(scopeMatch);}
function POOL(){const p=scopePool();return state.cat==="ALLE"?p:p.filter(q=>q.cat===state.cat);}
function catsForScope(){
  const seen=[];const order=[];
  scopePool().forEach(q=>{if(!seen.includes(q.cat)){seen.push(q.cat);order.push(q.cat);}});
  return order;
}

/* ===== Theme ===== */
function applyTheme(){document.body.dataset.theme=state.theme;$("#themeBtn").textContent=state.theme==="dark"?"\u2600\uFE0F":"\uD83C\uDF19";
  const tc=document.querySelector('meta[name="theme-color"]');if(tc)tc.setAttribute("content",state.theme==="dark"?"#0a1a24":"#eef4f8");}
$("#themeBtn").onclick=()=>{state.theme=state.theme==="dark"?"light":"dark";applyTheme();saveState();};
applyTheme();

/* ===== Dashboard / Render ===== */
function updateDash(){
  $("#s-answered").textContent=state.globalSeen;
  $("#s-acc").textContent=state.globalSeen?Math.round(state.globalCorrect/state.globalSeen*100)+"%":"\u2013";
  $("#s-mastered").textContent=POOL().filter(q=>state.cards[q.id].streak>=2).length;
}
function renderScope(){
  document.querySelectorAll(".scope-btn").forEach(b=>b.classList.toggle("active",b.dataset.scope===state.scope));
  $("#brandSub").innerHTML=state.scope==="binnen"?"Binnen":state.scope==="see"?"See":"Binnen &amp; See";
}
function renderCats(){
  const row=$("#catRow");row.innerHTML="";
  const cats=["ALLE"].concat(catsForScope());
  // wenn aktuelle cat im neuen scope nicht existiert -> ALLE
  if(state.cat!=="ALLE"&&!cats.includes(state.cat))state.cat="ALLE";
  cats.forEach(c=>{
    const n=c==="ALLE"?scopePool().length:scopePool().filter(q=>q.cat===c).length;
    const b=document.createElement("button");
    b.className="cat-btn"+(state.cat===c?" active":"");
    b.innerHTML=(c==="ALLE"?"Alle":esc(c))+`<span class="cnt">${n}</span>`;
    b.onclick=()=>{state.cat=c;saveState();renderCats();updateDash();};
    row.appendChild(b);
  });
}
document.querySelectorAll(".scope-btn").forEach(b=>b.onclick=()=>{
  state.scope=b.dataset.scope;state.cat="ALLE";saveState();renderScope();renderCats();updateDash();
});
renderScope();renderCats();updateDash();

/* ===== Quiz-Engine ===== */
let session=null;
function isExam(){return session&&(session.mode==="examCat"||session.mode==="examSim");}

// Amtlicher Prüfungsbogen: 7 Basis + 23 spezifisch (Motor)
function buildExamSim(){
  const sc=state.scope==="all"?"binnen":state.scope; // Sim braucht konkreten Bereich
  const basis=QUESTIONS.filter(q=>q.scope==="both");
  const spez=QUESTIONS.filter(q=>q.scope===sc);
  const pick=(arr,k)=>shuffle(arr.slice()).slice(0,Math.min(k,arr.length));
  return shuffle(pick(basis,7).concat(pick(spez,23)));
}

function startMode(mode){
  let list,timed=false,limit=0;
  if(mode==="sequential")list=POOL().slice().sort((a,b)=>a.n-b.n);
  else if(mode==="random")list=shuffle(POOL().slice());
  else if(mode==="wrong"){list=POOL().filter(q=>state.cards[q.id].wrong>0&&state.cards[q.id].streak===0);
    if(!list.length){toast("Keine falschen Fragen \u2013 stark! \uD83C\uDF89");return;}list=shuffle(list);}
  else if(mode==="flash"){startFlash();return;}
  else if(mode==="examCat"){const p=POOL();if(!p.length){toast("Keine Fragen in dieser Auswahl.");return;}
    const cnt=Math.min(30,p.length);list=shuffle(p.slice()).slice(0,cnt);timed=true;limit=cnt*45;}
  else if(mode==="examSim"){list=buildExamSim();timed=true;limit=45*60;}
  if(!list||!list.length){toast("Keine Fragen verf\u00fcgbar.");return;}
  // Optionen pro Frage mischen, richtige Position mitführen
  const prepared=list.map(q=>{
    const idx=q.o.map((_,i)=>i);shuffle(idx);
    const opts=idx.map(i=>q.o[i]);
    const correct=idx.map((orig,pos)=>q.a.includes(orig)?pos:-1).filter(x=>x>=0);
    return {q,opts,correct};
  });
  session={mode,items:prepared,idx:0,correct:0,wrong:0,wrongIds:[],timed,limit,timeLeft:limit,answered:false,picks:[]};
  show("quiz");$("#q-timer").classList.toggle("hidden",!timed);
  if(timed)startTimer();renderQuiz();
}
function startTimer(){clearInterval(session._t);updTimer();session._t=setInterval(()=>{session.timeLeft--;updTimer();if(session.timeLeft<=0){clearInterval(session._t);finishSession();}},1000);}
function updTimer(){const m=Math.floor(session.timeLeft/60),s=session.timeLeft%60;const el=$("#q-timer");el.textContent=`${m}:${String(s).padStart(2,"0")}`;el.classList.toggle("danger",session.timeLeft<=60);}

function renderQuiz(){
  const it=session.items[session.idx];session.answered=false;session.picks=[];
  $("#q-counter").textContent=`${session.idx+1} / ${session.items.length}`;
  $("#q-progbar").style.width=Math.round((session.idx)/session.items.length*100)+"%";
  $("#q-cat").textContent=it.q.cat;
  $("#q-text").textContent=it.q.q;
  $("#q-imgnote").classList.toggle("hidden",!needsImage(it.q));
  $("#q-feedback").classList.add("hidden");
  const multi=it.correct.length>1;
  const wrap=$("#q-opts");wrap.innerHTML="";
  const letters=["A","B","C","D","E","F"];
  it.opts.forEach((o,i)=>{
    const b=document.createElement("button");
    b.className="opt";b.dataset.i=i;
    b.innerHTML=`<span class="letter">${letters[i]}</span><span>${esc(o)}</span>`;
    b.onclick=()=>{
      if(session.answered)return;
      if(multi){b.classList.toggle("sel");session.picks=[...wrap.querySelectorAll(".opt.sel")].map(x=>+x.dataset.i);}
      else{wrap.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));b.classList.add("sel");session.picks=[i];}
      $("#q-action").disabled=session.picks.length===0;
    };
    wrap.appendChild(b);
  });
  const act=$("#q-action");
  act.textContent=isExam()?"Weiter":"Antwort pr\u00fcfen";
  act.disabled=true;
  window.scrollTo(0,0);
}

function evaluate(){
  const it=session.items[session.idx];
  const picks=session.picks.slice().sort();
  const corr=it.correct.slice().sort();
  const ok=picks.length===corr.length&&picks.every((v,i)=>v===corr[i]);
  // Statistik
  const c=state.cards[it.q.id];c.seen++;state.globalSeen++;
  if(ok){c.correct++;state.globalCorrect++;c.streak++;session.correct++;}
  else{c.wrong++;c.streak=0;session.wrong++;session.wrongIds.push(it.q.id);}
  saveState();
  return ok;
}

function showFeedback(ok){
  const it=session.items[session.idx];
  session.answered=true;
  const wrap=$("#q-opts");
  wrap.querySelectorAll(".opt").forEach((b,i)=>{
    b.classList.add("disabled");
    if(it.correct.includes(i))b.classList.add("correct");
    else if(session.picks.includes(i))b.classList.add("wrong");
  });
  const fb=$("#q-feedback");
  fb.className="feedback "+(ok?"ok":"no");
  fb.textContent=ok?"\u2713 Richtig!":"\u2717 Leider falsch \u2013 die korrekte Antwort ist markiert.";
  fb.classList.remove("hidden");
  $("#q-action").textContent="Weiter";$("#q-action").disabled=false;
}

$("#q-action").onclick=()=>{
  if(session.picks.length===0&&!session.answered)return;
  if(isExam()){
    // Prüfungsmodus: kein Feedback, nur werten und weiter
    evaluate();advance();
  }else{
    if(!session.answered){const ok=evaluate();showFeedback(ok);}
    else advance();
  }
};
function advance(){
  if(session.idx<session.items.length-1){session.idx++;renderQuiz();}
  else finishSession();
}
$("#q-exit").onclick=()=>{if(session&&session._t)clearInterval(session._t);if(confirm("Quiz beenden? Fortschritt der Runde geht verloren."))goHome();};

function finishSession(){
  if(session._t)clearInterval(session._t);
  const total=session.items.length;
  const correct=session.correct;
  const pct=total?Math.round(correct/total*100):0;
  const pass=pct>=75;
  show("results");
  const hero=$("#r-hero");hero.className="result-hero "+(isExam()?(pass?"pass":"fail"):"");
  $("#r-pct").textContent=pct+"%";
  if(isExam()){$("#r-verdict").textContent=pass?"Bestanden \uD83C\uDF89":"Nicht bestanden";}
  else{$("#r-verdict").textContent="Runde beendet";}
  $("#r-meta").textContent=`${correct} von ${total} richtig${isExam()?"  \u00b7  75 % zum Bestehen":""}`;
  if(isExam()){state.examHistory.push({d:Date.now(),pct,pass,mode:session.mode});saveState();}
  $("#r-retry").style.display=session.wrongIds.length?"":"none";
  updateDash();
}
$("#r-home").onclick=goHome;
$("#r-retry").onclick=()=>{
  const ids=session.wrongIds.slice();
  const list=shuffle(QUESTIONS.filter(q=>ids.includes(q.id)));
  const prepared=list.map(q=>{const idx=q.o.map((_,i)=>i);shuffle(idx);
    return {q,opts:idx.map(i=>q.o[i]),correct:idx.map((o,p)=>q.a.includes(o)?p:-1).filter(x=>x>=0)};});
  session={mode:"wrong",items:prepared,idx:0,correct:0,wrong:0,wrongIds:[],timed:false,limit:0,timeLeft:0,answered:false,picks:[]};
  show("quiz");$("#q-timer").classList.add("hidden");renderQuiz();
};
function goHome(){session=null;show("home");renderScope();renderCats();updateDash();}

/* ===== Flashcards ===== */
let flash=null;
function startFlash(){
  const list=shuffle(POOL().slice());
  if(!list.length){toast("Keine Fragen in dieser Auswahl.");return;}
  flash={list,idx:0};show("flash");renderFlash();
}
function renderFlash(){
  const q=flash.list[flash.idx];
  $("#f-counter").textContent=`${flash.idx+1} / ${flash.list.length}`;
  $("#f-progbar").style.width=Math.round(flash.idx/flash.list.length*100)+"%";
  $("#f-cat").textContent=q.cat;
  $("#f-text").textContent=q.q;
  $("#f-imgnote").classList.toggle("hidden",!needsImage(q));
  const ans=$("#f-answer");ans.classList.add("hidden");
  ans.textContent="Richtige Antwort: "+q.o[q.a[0]];
  $("#f-reveal").textContent="L\u00f6sung zeigen";
  window.scrollTo(0,0);
}
$("#f-reveal").onclick=()=>{const a=$("#f-answer");a.classList.toggle("hidden");$("#f-reveal").textContent=a.classList.contains("hidden")?"L\u00f6sung zeigen":"L\u00f6sung verbergen";};
$("#f-next").onclick=()=>{if(flash.idx<flash.list.length-1){flash.idx++;renderFlash();}else{toast("Alle Karten durch \u2713");goHome();}};
$("#f-exit").onclick=goHome;

/* ===== Mode-Buttons ===== */
document.querySelectorAll(".mode-card").forEach(b=>b.onclick=()=>startMode(b.dataset.mode));
$("#resetBtn").onclick=()=>{if(confirm("Gesamten Lernfortschritt wirklich zur\u00fccksetzen?")){
  const th=state.theme,sc=state.scope,ct=state.cat;state=freshState();state.theme=th;state.scope=sc;state.cat=ct;
  saveState();renderScope();renderCats();updateDash();toast("Fortschritt zur\u00fcckgesetzt \u21ba");}};

if(!LS)setTimeout(()=>toast("Hinweis: Speicher nicht verf\u00fcgbar \u2013 Fortschritt nur f\u00fcr diese Sitzung"),900);
</script>

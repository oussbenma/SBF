.","Drei weiße Topplichter senkrecht untereinander angebracht, die Seitenlichter und drei weiße Hecklichter waagerecht nebeneinander.","Drei weiße Topplichter in einem Dreieck angebracht, die Seitenlichter und zwei weiße Hecklichter waagerecht nebeneinander.","Drei weiße Topplichter waagerecht nebeneinander, die Seitenlichter und drei weiße Hecklichter waagerecht nebeneinander."],"a":[0]},{"scope":"binnen","cat":"Lichter, Sicht- & Schallzeichen","id":"b-247","n":247,"q":"Welches Fahrzeug führt am Bug einen roten Wimpel?","o":["Ein Fahrzeug mit Vorrang beim Schleusen.","Ein Fahrzeug mit Vorrang beim Be- und Entladen.","Ein Fahrzeug, das explosive Stoffe geladen hat.","Ein Fahrzeug, das brennbare Stoffe geladen hat."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-248","n":248,"q":"Wann gilt ein Sportboot auf den Binnenschifffahrtsstraßen als Kleinfahrzeug?","o":["Wenn das Fahrzeug eine Länge von weniger als 20 m hat.","Wenn das Fahrzeug eine Länge von 20 m hat.","Wenn das Fahrzeug eine Länge von 25 m hat.","Wenn das Fahrzeug eine Länge von mehr als 20 m hat."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-249","n":249,"q":"Welche Bedeutung hat die Bezeichnung eines Fahrzeuges mit einer rot-weißen Flagge und was ist zu beachten?","o":["Schutzbedürftiges Fahrzeug, Geschwindigkeit vermindern und Sog und Wellenschlag vermeiden.","Schutzbedürftiges Fahrzeug, Geschwindigkeit beibehalten und Sog und Wellenschlag vermeiden.","Schutzbedürftiges Fahrzeug, Geschwindigkeit vermindern.","Schutzbedürftiges Fahrzeug, Sog und Wellenschlag vermeiden."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-250","n":250,"q":"Welches optische Zeichen kann am Tage anstelle von vier kurzen Tönen gegeben werden?","o":["Eine rote Flagge im unteren Halbkreis schwenken.","Eine rote Flagge im oberen Halbkreis schwenken.","Eine rote Flagge im Kreis schwenken.","Eine rote Flagge zeigen."],"a":[0]},{"scope":"binnen","cat":"Sicherheit, Notfall & Umwelt","id":"b-251","n":251,"q":"Welches optische Zeichen kann in der Nacht oder bei verminderter Sicht anstelle von vier kurzen Tönen gegeben werden?","o":["Ein rotes Licht im unteren Halbkreis schwenken.","Ein rotes Licht im oberen Halbkreis schwenken.","Ein rotes Licht im Kreis schwenken.","Ein rotes Licht zeigen."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-252","n":252,"q":"Welcher Befähigungsnachweis ist zur Teilnahme am Binnenschifffahrtsfunk erforderlich?","o":["Das UKW-Sprechfunkzeugnis für den Binnenschifffahrtsfunk.","Das CB-Sprechfunkzeugnis für den Binnenschifffahrtsfunk.","Das Seefunkzeugnis für den Binnenschifffahrtsfunk.","Das SRC-Sprechfunkzeugnis für den Binnenschifffahrtsfunk."],"a":[0]},{"scope":"binnen","cat":"Führerschein, Recht & Zuständigkeit","id":"b-253","n":253,"q":"Was bedeutet Radarfahrt?","o":["Eine Fahrt bei unsichtigem Wetter mit Radar.","Eine Fahrt bei Nacht mit Radar.","Eine Fahrt mit Radar.","Eine Fahrt am Tage mit Radar."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-73","n":73,"q":"Wo gelten die Kollisionsverhütungsregeln (KVR)?","o":["Auf der Hohen See und auf den mit dieser zusammenhängenden, von Seeschiffen befahrbaren Gewässern.","Auf der Hohen See und den deutschen Seeschifffahrtsstraßen, die von Seeschiffen befahren werden.","Auf den Seeschifffahrtsstraßen und den küstennahen deutschen Seegewässern, die von Seeschiffen befahren werden.","Auf der Hohen See und den von Seeschiffen befahrbaren Randmeeren, mit Ausnahme der Verkehrstrennungsgebiete."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-74","n":74,"q":"Was gilt, wenn eine Bestimmung der Seeschifffahrtsstraßen-Ordnung (SeeSchStrO) mit den Kollisionsverhütungsregeln (KVR) im Widerspruch steht?","o":["Die Vorschrift der Seeschifffahrtsstraßen-Ordnung.","Die Vorschrift der Kollisionsverhütungsregeln (KVR).","Die Grundregeln für das Verhalten im Verkehr.","Die Vorschrift der Schifffahrtsordnung Emsmündung."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-75","n":75,"q":"Welche Sportboote sind von der Fahrerlaubnispflicht auf den Seeschifffahrtsstraßen ausgenommen?","o":["Sportboote ohne Antriebsmaschine oder solche mit einer größten, nicht überschreitbaren Nutzleistung von 11,03 Kilowatt (15 PS) bei Verwendung eines Verbrennungsmotors bzw. 7,5 Kilowatt bei Verwendung eines Elektromotors Betriebsart S1 (Dauerbetrieb) oder weniger.","Sportboote unter Segel mit einer Rumpflänge unter 20 m und solche deren Antriebsmaschine nicht benutzt wird.","Sportboote mit Antriebsmaschine mit einer größeren Nutzleistung als 11,03 Kilowatt (15 PS) bei Verwendung eines Verbrennungsmotors bzw. 7,5 Kilowatt bei Verwendung eines Elektromotors Betriebsart S1 (Dauerbetrieb).","Sportboote, die entweder vor Anker liegen oder an Land festgemacht sind oder auf Grund sitzen."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-76","n":76,"q":"Wer ist für die Befolgung der Verkehrsvorschriften verantwortlich?","o":["Der Fahrzeugführer oder sein Stellvertreter.","Der Fahrzeugführer und sein Stellvertreter.","Der Fahrzeugführer und jeder sonst Verantwortliche.","Der Fahrzeugführer oder jeder sonst Verantwortliche."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-77","n":77,"q":"Was bedeutet \"seemännische Sorgfaltspflicht\"?","o":["Die Verpflichtung zur Beachtung von Vorsichtsmaßregeln über die Verkehrsvorschriften hinaus, die Seemannsbrauch oder besondere Umstände des Falles erfordern.","Die Verpflichtung zur Beachtung der Seeschifffahrtsstraßen-Ordnung (SeeSchStrO), der Kollisionsverhütungsregeln (KVR), der Grundregeln für das Verhalten im Verkehr und der Ausweichregeln mit dem Manöver des letzten Augenblicks.","Die Verpflichtung zur Beachtung der Vorsichtsmaßregeln und Sicherheitsregeln der Verkehrsvorschriften und der Grundregeln für das Verhalten im Verkehr.","Die Verpflichtung zur Beachtung von Vorsichtsmaßregeln der Kollisionsverhütungsregeln (KVR), der Grundregeln für das Verhalten im Verkehr und der Ausweichregeln mit dem Manöver des letzten Augenblicks."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-78","n":78,"q":"Welche Sicherheitsmaßnahmen hat der Fahrzeugführer im Rahmen seiner seemännischen Sorgfaltspflicht vor Fahrtantritt zum Schutze und für die Sicherheit der Personen an Bord zu treffen?","o":["Der Fahrzeugführer hat die Besatzungsmitglieder und Gäste über die Sicherheitsvorkehrungen an Bord zu unterrichten, in die Handhabung der Rettungs- und Feuerlöschmittel einzuweisen und auf geeignete Maßnahmen gegen das Überbordfallen hinzuweisen, zudem darauf, dass ständig angelegte Rettungswesten die Überlebenschancen im Wasser erhöhen.","Der Fahrzeugführer muss die Besatzungsmitglieder und Gäste anweisen, dass sie sich über die Sicherheitsvorkehrungen an Bord informieren, sich die Gebrauchsanweisungen der Rettungs- und Feuerlöschmittel ansehen und auf geeignete Maßnahmen gegen das Überbordfallen achten, zudem darauf, dass ständig angelegte Rettungswesten die Überlebenschancen im Wasser erhöhen.","Der Fahrzeugführer hat die verantwortlichen Besatzungsmitglieder über die Sicherheitsvorkehrungen an Bord zu unterrichten, in die Handhabung der Rettungs- und Feuerlöschmittel einzuweisen und auf geeignete Maßnahmen gegen das Überbordfallen hinzuweisen, zudem darauf, dass ständig angelegte Rettungswesten die Überlebenschancen im Wasser erhöhen.","Der Fahrzeugführer hat die Gäste an Bord über die Sicherheitsvorkehrungen an Bord zu unterrichten, in die Handhabung der Rettungs- und Feuerlöschmittel einzuweisen und auf geeignete Maßnahmen gegen das Überbordfallen hinzuweisen, zudem darauf, dass ständig angelegte Rettungswesten die Überlebenschancen im Wasser erhöhen."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-79","n":79,"q":"Was bedeutet das \"Manöver des letzten Augenblicks\"?","o":["Ausweichmanöver des Kurshalters.","Ausweichmanöver des Ausweichpflichtigen.","Ausweichmanöver des Kurshalters und des Ausweichpflichtigen.","Ausweichmanöver des Kurshalters oder des Ausweichpflichtigen."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-80","n":80,"q":"Wann ist das \"Manöver des letzten Augenblicks\" durchzuführen?","o":["Es muss durchgeführt werden, wenn ein Zusammenstoß durch Manöver des Ausweichpflichtigen allein nicht mehr vermieden werden kann.","Es muss durchgeführt werden, wenn ein Zusammenstoß durch Manöver des Kurshalters allein nicht mehr vermieden werden kann.","Es muss im letzten Augenblick von jedem durchgeführt werden, wenn ein Zusammenstoß sonst nicht mehr vermieden werden kann.","Es muss kurz vor der Kollision durchgeführt werden, wenn sonst ein Zusammenstoß durch Manöver des Kurshalters allein nicht mehr vermieden werden kann."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-81","n":81,"q":"Wann gilt ein Fahrzeug als überholendes Fahrzeug?","o":["Wenn es sich einem anderen Fahrzeug aus einer Richtung von mehr als 22,5° achterlicher als querab (Bereich des Hecklichtes) nähert.","Wenn es sich einem anderen Fahrzeug aus einer Richtung von mehr als 112,5° achterlicher als querab (Bereich der Seitenlichter) nähert.","Wenn es sich einem anderen Fahrzeug gegenüber in einer Richtung von mehr als 22,5° achterlicher als querab (Bereich des Hecklichtes) befindet.","Wenn es an einem anderen Fahrzeug aus einer achterlichen Richtung von mehr als 22,5° querab kommend (Bereich des Topplichtes) vorbeifährt."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-82","n":82,"q":"Wann ist ein Fahrzeug manövrierunfähig?","o":["Wenn es wegen außergewöhnlicher Umstände, z. B. Ausfall der Ruder- oder Maschinenanlage, nicht so wie vorgeschrieben manövrieren und daher einem anderen Fahrzeug nicht ausweichen kann.","Wenn es wegen der Art seines Einsatzes behindert ist und deshalb nicht so wie vorgeschrieben manövrieren und daher einem anderen Fahrzeug nicht ausweichen kann.","Wenn es wegen seines Tiefgangs im Verhältnis zu der vorhandenen Tiefe und Breite des befahrbaren Gewässers erheblich behindert ist, von seinem zu verfolgenden Kurs abzuweichen.","Wenn es mit Netzen, Leinen, Schleppnetzen oder anderen Fanggeräten fischt, welche die Manövrierfähigkeit einschränken."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-83","n":83,"q":"Wann ist ein Fahrzeug manövrierbehindert?","o":["Wenn es wegen der Art seines Einsatzes behindert ist und deshalb nicht so wie vorgeschrieben manövrieren und daher einem anderen Fahrzeug nicht ausweichen kann.","Wenn es wegen außergewöhnlicher Umstände, z. B. Ausfall der Ruder- oder Maschinenanlage, nicht so wie vorgeschrieben manövrieren und daher einem anderen Fahrzeug nicht ausweichen kann.","Wenn es wegen seines Tiefgangs im Verhältnis zu der vorhandenen Tiefe und Breite des befahrbaren Gewässers erheblich behindert ist, von seinem zu verfolgenden Kurs abzuweichen.","Wenn es mit Netzen, Leinen, Schleppnetzen oder anderen Fanggeräten fischt, welche die Manövrierfähigkeit einschränken."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-84","n":84,"q":"Welche besonderen Maßnahmen sind bei verminderter Sicht zu treffen?","o":["Es muss mit sicherer, den verminderten Sichtverhältnissen angepasster Geschwindigkeit gefahren werden, es müssen Schallsignale gegeben werden, es müssen Positionslichter eingeschaltet werden und es muss gehörig Ausguck gegangen werden.","Es muss mit sicherer, den verminderten Sichtverhältnissen angepasster Geschwindigkeit gefahren werden, es müssen Schallsignale gegeben werden, das Radargerät muss eingeschaltet werden und es muss Ausguck gegangen werden.","Es muss mit sicherer, den verminderten Sichtverhältnissen angepasster Geschwindigkeit gefahren werden, es müssen Schallsinale gegeben werden, es müssen Positionslichter eingeschaltet werden und es muss der Radarreflektor eingesetzt werden.","Es muss mit verminderter Geschwindigkeit gefahren werden, es müssen Schallsignale gegeben werden, es müssen Positionslichter eingeschaltet werden und es muss das AIS (Automatic Identifikation System) eingeschaltet werden."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-85","n":85,"q":"Welche Vorschriften regeln die Ausrüstung, Anordnung und Anbringung der Positionslaternen, Sichtzeichen und Schallsignalanlagen auf Fahrzeugen?","o":["Die Kollisionsverhütungsregeln (KVR), die Seeschifffahrtsstraßen-Ordnung (SeeSchStrO) und die Schifffahrtsordnung Emsmündung (EmsSchO).","Die Kollisionsverhütungsregeln (KVR), die Seeschifffahrtsstraßen-Ordnung (SeeSchStrO) und die Sportbootführerscheinverordnung.","Die Kollisionsverhütungsregeln (KVR), die Seeschifffahrtsstraßen-Ordnung (SeeSchStrO) und die Schiffssicherheitsverordnung.","Die Kollisionsverhütungsregeln (KVR), die Seeschifffahrtsstraßen-Ordnung (SeeSchStrO) und die Verordnung zur Sicherung der Seefahrt."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-86","n":86,"q":"Welche Positionslaternen und Schallsignalanlagen dürfen auf Sportbooten unter deutscher Flagge verwendet werden?","o":["Solche, deren Baumuster vom Bundesamt für Seeschifffahrt und Hydrographie (BSH) zur Verwendung zugelassen sind oder eine als gleichwertig anerkannte Zulassung eines EU-Staates besitzen.","Solche, die die vorgeschriebene Mindesttragweite von drei Seemeilen, die Größe und Farbgebung bzw. Lautstärke erreichen und mit einer Bescheinigung einer Klassifikationsgesellschaft versehen sind.","Solche, die gemäß der Kollisionsverhütungsregeln (KVR), der Seeschifffahrtsstraßen-Ordnung (SeeSchStrO) und der Schifffahrtsordnung Emsmündung (EmsSchO) vorgeschrieben sind und ein CE-Zeichen haben.","Solche, die vom Technischen Überwachungsverein (TÜV) geprüft und mit dem Zeichen für geprüfte Sicherheit (GS) versehen sind."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-87","n":87,"q":"Was sind \"Verkehrstrennungsgebiete\"?","o":["Es sind bekannt gemachte Schifffahrtswege, die durch Trennlinien oder Trennzonen in Einbahnwege geteilt sind.","Es sind bekannt gemachte Fahrwasser, die durch Trennlinien oder Trennzonen in Einbahnwege geteilt sind.","Es sind bekannt gemachte Seeschifffahrtsstraßen, die durch Trennlinien oder Trennzonen in Einbahnwege geteilt sind.","Es sind bekannt gemachte Bundeswasserstraßen, die durch Trennlinien oder Trennzonen in Einbahnwege geteilt sind."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-88","n":88,"q":"Wie sind Verkehrstrennungsgebiete zu befahren?","o":["Sie dürfen jeweils nur in der allgemeinen Verkehrsrichtung rechts der Trennlinie oder Trennzone befahren werden.","Sie dürfen jeweils nur in Fahrtrichtung links der Trennlinie oder Trennzone befahren werden.","Sie dürfen innerhalb der äußeren Trennlinien nur in einer Fahrtrichtung befahren werden.","Sie dürfen nur vom Anfang bis zum Ende und jeweils nur in Fahrtrichtung rechts der Trennzone befahren werden."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-89","n":89,"q":"Was bedeutet \"in Sicht befindlich\"?","o":["Wenn jedes Fahrzeug vom anderen optisch wahrgenommen werden kann.","Wenn jeder Fahrzeugführer vom anderen optisch wahrgenommen werden kann.","Wenn beide Fahrzeuge optisch wahrgenommen werden können.","Wenn jedes Fahrzeug auch bei unsichtigem Wetter optisch wahrgenommen werden kann."],"a":[0]},{"scope":"see","cat":"Recht, Verkehr & Umwelt (See)","id":"s-90","n":90,"q":"Was bedeutet sichere Geschwindigkeit?","o":["Die Geschwindigkeit muss der Verkehrslage, den Sicht- und Witterungsverhältnissen angepasst sein und es muss jederzeit aufgestoppt werden können.","Die Geschwindigkeit muss der Verkehrslage, den Sicht- und Witterungsverhältnissen angepasst sein und der Verkehr darf nicht behindert werden.","Die Geschwindigkeit muss der Verkehrslage, den Sicht- und Witterungsverhältnissen und dem Treibstoffverbrauch angepasst sein.","Die Geschwindigkeit muss der Verkehrslage, dem Verkehrsaufkommen, den Seegangs- und Windverhältnissen angepasst sein, so dass kein Sog und Wellenschlag entsteht."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-91","n":91,"q":"Welches Fahrzeug führt diese Lichter?","o":["Maschinenfahrzeug in Fahrt von weniger als 50 m Länge.","Maschinenfahrzeug in Fahrt von 50 und mehr Meter Länge.","Ein manövrierunfähiges Fahrzeug in Fahrt.","Ein manövrierbehindertes Fahrzeug mit Fahrt durchs Wasser von 50 und mehr Meter Länge."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-92","n":92,"q":"Welches Fahrzeug muss diese Lichter führen?","o":["Maschinenfahrzeug in Fahrt von 50 und mehr Meter Länge.","Maschinenfahrzeug in Fahrt von weniger als 50 m Länge.","Ein manövrierunfähiges Fahrzeug in Fahrt.","Ein manövrierbehindertes Fahrzeug mit Fahrt durchs Wasser von 50 und mehr Meter Länge."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-93","n":93,"q":"Welches Fahrzeug führt diese Lichter?","o":["Manövrierbehinderter Schleppverband in Fahrt von 200 m Länge oder weniger.","Manövrierbehinderter Schleppverband in Fahrt von mehr als 200 m Länge.","Manövrierbehinderter Schleppverband in Fahrt von 200 m Länge oder weniger, ohne Fahrt durchs Wasser.","Ein manövrierbehindertes Fahrzeug mit Fahrt durchs Wasser von 50 und mehr Meter Länge."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-94","n":94,"q":"Welches Fahrzeug führt diese Lichter?","o":["Manövrierbehinderter Schleppverband in Fahrt von mehr als 200 m Länge.","Manövrierbehinderter Schleppverband in Fahrt von 200 m Länge oder weniger.","Manövrierbehinderter Schleppverband in Fahrt von mehr als 200 m Länge, ohne Fahrt durch das Wasser.","Ein manövrierbehindertes Fahrzeug, das baggert oder Unterwasserarbeiten ausführt und dabei die Schifffahrt behindert."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-95","n":95,"q":"Welche Lichter führen ges ,"Ein manövrierbehindertes Fahrzeug.","Ein manövrierunfähiges Fahrzeug in Fahrt.","Ein Grundsitzer von 50 m und mehr Meter Länge."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-106","n":106,"q":"Welches Fahrzeug führt diese Signalkörper?","o":["Ein Grundsitzer.","Ein manövrierunfähiges Fahrzeug.","Ein manövrierbehindertes Fahrzeug.","Ein fischendes Fahrzeug."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-107","n":107,"q":"Welches Fahrzeug führt diese Lichter?","o":["Ein Grundsitzer von 50 und mehr Meter Länge.","Ein manövrierbehindertes Fahrzeug.","Ein manövrierunfähiges Fahrzeug in Fahrt.","Ein Grundsitzer von weniger als 50 m Länge."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-108","n":108,"q":"Welches Fahrzeug muss diese Lichter führen?","o":["Ein tiefgangbehindertes Fahrzeug von 50 und mehr Meter Länge in Fahrt.","Ein manövrierbehindertes Fahrzeug.","Ein manövrierunfähiges Fahrzeug.","Ein Grundsitzer von weniger als 50 m Länge."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-109","n":109,"q":"Welches Fahrzeug führt diese Signalkörper?","o":["Ein tiefgangbehindertes Fahrzeug in Fahrt.","Ein manövrierbehindertes Fahrzeug in Fahrt.","Ein manövrierunfähiges Fahrzeug in Fahrt.","Ein Grundsitzer von weniger als 50 Meter Länge."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-110","n":110,"q":"Welches Fahrzeug muss diese Lichter führen?","o":["Ein fischender Trawler (Fischereifahrzeug) mit Fahrt durch das Wasser von 50 und mehr Meter Länge.","Ein fischendes Fahrzeug in Fahrt, das nicht trawlt, z. B. Treibnetzfischer.","Ein Behördenfahrzeug im Einsatz.","Ein manövrierbehindertes Fahrzeug in Fahrt."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-111","n":111,"q":"Welches Fahrzeug führt diese Lichter?","o":["Ein fischendes Fahrzeug in Fahrt oder vor Anker, das nicht trawlt, z. B. Treibnetzfischer.","Ein Lotsenfahrzeug im Einsatz.","Ein manövrierbehindertes Fahrzeug in Fahrt.","Ein fischender Trawler (Fischereifahrzeug) mit Fahrt durchs Wasser von 50 und mehr Meter Länge."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-112","n":112,"q":"Welches Fahrzeug führt diese Signalkörper?","o":["Ein fischendes Fahrzeug in Fahrt oder vor Anker.","Ein manövrierbehindertes Fahrzeug.","Ein manövrierunfähiges Fahrzeug in Fahrt.","Ein Grundsitzer von weniger als 50 m Länge."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-113","n":113,"q":"Welche Fahrzeuge führen nur Seitenlichter rot und grün und ein weißes Hecklicht?","o":["Segelfahrzeuge, Ruderboote und geschleppte Fahrzeuge.","Segelfahrzeuge, Ruderboote und Maschinenfahrzeuge in Fahrt von weniger als 50 m Länge.","Segelfahrzeuge, fischende Fahrzeuge und geschleppte Fahrzeuge.","Segelfahrzeuge, Grundsitzer und geschleppte Fahrzeuge."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-114","n":114,"q":"Was für ein Licht muss ein Ankerlieger von weniger als 50 m Länge führen?","o":["Ein weißes Rundumlicht an gut sichtbarer Stelle.","Ein rotes Rundumlicht an gut sichtbarer Stelle.","Zwei weiße Rundumlichter an gut sichtbarer Stelle.","Zwei rote Rundumlichter an gut sichtbarer Stelle."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-115","n":115,"q":"Welches Fahrzeug muss diese Lichter führen?","o":["Ein vor Anker liegendes Fahrzeug von 100 und mehr Meter Länge.","Ein fischender Trawler (Fischereifahrzeug) mit Fahrt durchs Wasser von 50 und mehr Meter Länge.","Ein manövrierbehindertes Fahrzeug, das baggert oder Unterwasserarbeiten ausführt und dabei die Schifffahrt behindert.","Ein Grundsitzer von 200 und mehr Meter Länge."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-116","n":116,"q":"Sie hören bei verminderter Sicht mindestens alle zwei Minuten einen langen Ton mit der Pfeife ( ). Welches Fahrzeug gibt dieses Signal?","o":["Ein Maschinenfahrzeug, das Fahrt durchs Wasser macht.","Ein geschlepptes Fahrzeug oder das letzte bemannte Fahrzeug eines Schleppverbandes in Fahrt.","Ein Fahrzeug mit gefährlicher Ladung vor Anker von weniger als 100 m Länge.","Ein vor Anker liegendes Fahrzeug von 100 und mehr Meter Länge."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-117","n":117,"q":"Sie hören bei verminderter Sicht mindestens alle zwei Minuten zwei aufeinander folgende lange Töne mit der Pfeife ( ). Welches Fahrzeug gibt dieses Signal?","o":["Ein Maschinenfahrzeug in Fahrt, das seine Maschine gestoppt hat und keine Fahrt durchs Wasser macht.","Ein geschlepptes Fahrzeug oder das letzte bemannte Fahrzeug eines Schleppverbandes in Fahrt.","Ein Fahrzeug mit gefährlicher Ladung vor Anker von weniger als 100 m Länge.","Ein vor Anker liegendes Fahrzeug von 100 und mehr Meter Länge."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-118","n":118,"q":"Welche Fahrzeuge geben bei verminderter Sicht mindestens alle zwei Minuten drei aufeinander folgende Töne mit der Pfeife, und zwar lang, kurz, kurz ?","o":["Ein manövrierunfähiges Fahrzeug in Fahrt, ein manövrierbehindertes Fahrzeug in Fahrt oder vor Anker, ein tiefgangbehindertes Fahrzeug in Fahrt, ein Segelfahrzeug in Fahrt, ein schleppendes oder schiebendes Fahrzeug in Fahrt, ein fischendes Fahrzeug in Fahrt oder vor Anker.","Ein manövrierunfähiges Fahrzeug in Fahrt, ein manövrierbehindertes Fahrzeug in Fahrt oder vor Anker, ein tiefgangbehindertes Fahrzeug in Fahrt, ein Maschinenfahrzeug in Fahrt, das Fahrt durchs Wasser macht, ein schleppendes oder schiebendes Fahrzeug in Fahrt, ein fischendes Fahrzeug in Fahrt oder vor Anker.","Ein manövrierunfähiges Fahrzeug in Fahrt, ein manövrierbehindertes Fahrzeug in Fahrt oder vor Anker, ein tiefgangbehindertes Fahrzeug in Fahrt, ein Segelfahrzeug in Fahrt, ein schleppendes oder schiebendes Fahrzeug in Fahrt, ein fischendes Fahrzeug in Fahrt oder vor Anker, ein Maschinenfahrzeug in Fahrt, das seine Maschine gestoppt hat und keine Fahrt durchs Wasser macht.","Ein manövrierunfähiges Fahrzeug in Fahrt, ein manövrierbehindertes Fahrzeug in Fahrt oder vor Anker, ein tiefgangbehindertes Fahrzeug in Fahrt, ein Segelfahrzeug in Fahrt, ein schleppendes oder schiebendes Fahrzeug in Fahrt, ein geschlepptes Fahrzeug oder das letzte bemannte Fahrzeug eines Schleppverbandes in Fahrt, ein fischendes Fahrzeug in Fahrt oder vor Anker."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-119","n":119,"q":"Welches Fahrzeug gibt bei verminderter Sicht - im Anschluss an das Signal: lang, kurz, kurz - vier aufeinander folgende Töne mit der Pfeife, und zwar: lang, kurz, kurz, kurz ?","o":["Ein geschlepptes Fahrzeug oder das letzte bemannte Fahrzeug eines Schleppverbandes in Fahrt.","Ein Maschinenfahrzeug in Fahrt, das seine Maschine gestoppt hat und keine Fahrt durchs Wasser macht.","Ein Fahrzeug mit gefährlicher Ladung vor Anker von weniger als 100 m Länge.","Ein manövrierunfähiges Fahrzeug von weniger als 100 m Länge."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-120","n":120,"q":"Was für ein Schallsignal muss ein Segelfahrzeug in Fahrt von 12 und mehr Meter Länge bei verminderter Sicht geben?","o":["Mindestens alle zwei Minuten drei aufeinander folgende Töne mit der Pfeife, und zwar lang, kurz, kurz","Mindestens alle zwei Minuten drei aufeinander folgende Töne mit der Pfeife, und zwar lang, lang, kurz","Mindestens alle zwei Minuten ein kräftiges Schallsignal, das mit den vorgeschriebenen nicht verwechselt werden kann.","Mit der Pfeife kurz, lang, kurz"],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-121","n":121,"q":"Welches Schallsignal muss ein Fahrzeug in Fahrt von weniger als 12 m Länge bei verminderter Sicht geben, wenn es die sonst vorgeschriebenen Schallsignale nicht geben kann?","o":["Mindestens alle zwei Minuten ein kräftiges Schallsignal, das mit den vorgeschriebenen nicht verwechselt werden kann.","Mindestens alle zwei Minuten drei aufeinander folgende Töne mit der Pfeife, und zwar lang, kurz, kurz .","Mindestens alle zwei Minuten drei aufeinander folgende Töne mit der Pfeife, und zwar lang, lang, kurz .","Mit der Pfeife kurz, lang, kurz ."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-122","n":122,"q":"Welches Fahrzeug gibt bei verminderter Sicht mindestens jede Minute etwa 5 Sekunden lang rasches Läuten der Glocke?","o":["Ein Fahrzeug vor Anker von weniger als 100 m Länge.","Ein Fahrzeug vor Anker von 100 und mehr Meter Länge.","Ein geschlepptes Fahrzeug oder das letzte bemannte Fahrzeug eines Schleppverbandes in Fahrt.","Ein Maschinenfahrzeug in Fahrt, das seine Maschine gestoppt hat und keine Fahrt durchs Wasser macht."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-123","n":123,"q":"Welches Fahrzeug gibt bei verminderter Sicht mindestens jede Minute etwa 5 Sekunden lang rasches Läuten der Glocke und unmittelbar danach ungefähr 5 Sekunden lang rasch den Gong schlagen?","o":["Ein Fahrzeug vor Anker von 100 und mehr Meter Länge.","Ein Fahrzeug vor Anker von weniger als 100 m Länge.","Ein geschlepptes Fahrzeug oder das letzte bemannte Fahrzeug eines Schleppverbandes in Fahrt.","Ein Maschinenfahrzeug in Fahrt, das seine Maschine gestoppt hat und keine Fahrt durchs Wasser macht."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-124","n":124,"q":"Welches zusätzliche Schallsignal darf jeder Ankerlieger bei verminderter Sicht geben, um einem sich nähernden Fahrzeug seinen Standort anzuzeigen?","o":["Mit der Pfeife kurz, lang, kurz .","Mindestens alle zwei Minuten ein kräftiges Schallsignal, das mit den vorgeschriebenen nicht verwechselt werden kann.","Mindestens alle zwei Minuten drei aufeinander folgende Töne mit der Pfeife, und zwar lang, kurz, kurz .","Mindestens alle zwei Minuten drei aufeinander folgende Töne mit der Pfeife, und zwar lang, lang, kurz ."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-125","n":125,"q":"Woran kann man feststellen, ob die Möglichkeit der Gefahr eines Zusammenstoßes besteht?","o":["Wenn sich der Abstand zum anderen Fahrzeug verringert und sich die Peilung nicht oder nicht merklich ändert.","Wenn sich der Abstand zum anderen Fahrzeug verringert und sich der Kurs nicht oder nicht merklich ändert.","Wenn sich der Abstand zum anderen Fahrzeug verringert und sich die Kompasspeilung ändert.","Wenn sich der Abstand zum anderen Fahrzeug verringert und sich der Kurs ändert."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-126","n":126,"q":"Zwei in Sicht befindliche Segelfahrzeuge nähern sich im freien Seeraum oder außerhalb des Fahrwassers so, dass die Möglichkeit der Gefahr eines Zusammenstoßes besteht. Welches Fahrzeug muss dem anderen ausweichen, wenn sie den Wind von derselben Seite haben?","o":["Das luvwärtige Fahrzeug dem leewärtigen Fahrzeug.","Das leewärtige Fahrzeug dem luvwärtigen Fahrzeug.","Dasjenige Fahrzeug, das den Wind von Backbord hat.","Dasjenige Fahrzeug, das den Wind von Steuerbord hat."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-127","n":127,"q":"Wie müssen sich zwei in Sicht befindliche Maschinenfahrzeuge verhalten, die sich einander auf entgegengesetzten oder fast entgegengesetzten Kursen nähern, um die Möglichkeit der Gefahr eines Zusammenstoßes zu vermeiden?","o":["Jedes Fahrzeug muss seinen Kurs nach Steuerbord ändern.","Jedes Fahrzeug muss seinen Kurs nach Backbord ändern.","Es muss das luvwärtige Fahrzeug dem leewärtigen Fahrzeug ausweichen.","Es muss das leewärtige Fahrzeug dem luvwärtigen Fahrzeug ausweichen."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-128","n":128,"q":"Wie hat sich ein Maschinenfahrzeug im freien Seeraum oder außerhalb des Fahrwassers gegenüber einem in Sicht befindlichen Segelfahrzeug zu verhalten, wenn die Möglichkeit der Gefahr eines Zusammenstoßes besteht?","o":["Das Maschinenfahrzeug muss ausweichen.","Das Maschinenfahrzeug muss Kurs und Geschwindigkeit beibehalten.","Das Maschinenfahrzeug muss seine Fahrt verringern.","Das Maschinenfahrzeug muss vorsichtig manövrieren bis die Gefahr vorüber ist."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-129","n":129,"q":"Wie hat sich ein Maschinenfahrzeug im freien Seeraum oder außerhalb des Fahrwassers gegenüber einem in Sicht befindlichen manövrierunfähigen Fahrzeug zu verhalten, wenn die Möglichkeit der Gefahr eines Zusammenstoßes besteht?","o":["Das Maschinenfahrzeug muss ausweichen.","Das Maschinenfahrzeug muss Kurs und Geschwindigkeit beibehalten.","Das Maschinenfahrzeug muss seinen Kurs nach Steuerbord ändern.","Das Maschinenfahrzeug muss seine Fahrt verringern."],"a":[0]},{"scope":"see","cat":"Lichter & Signale (See)","id":"s-130","n":130,"q":"Wie hat sich ein Maschinenfahrzeug im freien Seeraum oder außerhalb des Fahrwassers gegenüber einem in Sicht befindlichen manövrierbehinderten Fahrzeug zu verhalten, wenn die Möglichkeit der Gefahr eines Zusammenstoßes besteht?","o":["Das Maschinenfahrzeug muss ausweichen.","Das Maschinenfahrzeug muss Kurs und Geschwindigkeit beibehalten.","Das Maschinenfahrzeug muss seinen Kurs nach Steuerbord ändern.","Das Maschinenfahrzeug muss seine Fahrt verringern."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-131","n":131,"q":"Wie hat sich ein Maschinenfahrzeug im freien Seeraum oder außerhalb des Fahrwassers gegenüber einem in Sicht befindlichen fischenden Fahrzeug zu verhalten, wenn die Möglichkeit der Gefahr eines Zusammenstoßes besteht?","o":["Das Maschinenfahrzeug muss ausweichen.","Das Maschinenfahrzeug muss Kurs und Geschwindigkeit beibehalten.","Das Maschinenfahrzeug muss seinen Kurs nach Steuerbord ändern.","Das Maschinenfahrzeug muss vorsichtig manövrieren, bis die Gefahr vorüber ist."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-132","n":132,"q":"Wie hat sich ein Segelfahrzeug im freien Seeraum oder außerhalb des Fahrwassers gegenüber einem in Sicht befindlichen fischenden Fahrzeug zu verhalten, wenn die Möglichkeit der Gefahr eines Zusammenstoßes besteht?","o":["Das Segelfahrzeug muss ausweichen.","Das Segelfahrzeug muss seinen Kurs nach Steuerbord ändern.","Das Segelfahrzeug darf die sichere Durchfahrt nicht behindern.","Das Segelfahrzeug muss Kurs und Geschwindigkeit zunächst beibehalten."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-133","n":133,"q":"Wie muss man sich gegenüber diesem Fahrzeug verhalten?","o":["Die sichere Durchfahrt des Fahrzeugs darf nicht behindert werden.","Das Fahrzeug muss an Steuerbord passiert werden.","Sog und Wellenschlag vermeiden.","Kurs und Geschwindigkeit beibehalten."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-134","n":134,"q":"Wie muss man sich gegenüber diesem Fahrzeug verhalten?","o":["Die sichere Durchfahrt des Fahrzeugs darf nicht behindert werden.","Das Fahrzeug muss an Steuerbord passiert werden.","Sog und Wellenschlag vermeiden.","Kurs und Geschwindigkeit beibehalten."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-135","n":135,"q":"Wie verhält sich der Kurshaltepflichtige vor Einleitung des Manövers des letzten Augenblicks gegenüber einem ausweichpflichtigen Fahrzeug?","o":["Kurs und Geschwindigkeit zunächst beibehalten und dem Ausweichpflichtigen besondere Aufmerksamkeit widmen.","Kurs oder Geschwindigkeit anpassen und dem Ausweichpflichtigen besondere Aufmerksamkeit widmen.","Kurs nach Steuerbord ändern. Geschwindigkeit verringern und dem Ausweichpflichtigen besondere Aufmerksamkeit widmen.","Kurs nach Steuerbord ändern, Geschwindigkeit zunächst beibehalten und dem Ausweichpflichtigen besondere Aufmerksamkeit widmen."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-136","n":136,"q":"Wie muss sich ein Ausweichpflichtiger gegenüber einem Kurshalter verhalten?","o":["Das Ausweichmanöver muss frühzeitig, durchgreifend und klar erkennbar durchgeführt werden.","Der Kurs muss bei Annäherung an den Kurshalter Schritt für Schritt so angepasst werden, dass das Heck des Anderen sicher umfahren wird.","Das Manöver des letzten Augenblicks ist durchzuführen. Es muss so ausgewichen werden, wie es zur Vermeidung eines Zusammenstoßes am dienlichsten ist.","Die Fahrt ist auf das für die Steuerfähigkeit erforderliche Mindestmaß zu reduzieren; im Zweifelsfall muss ganz aufgestoppt werden."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-137","n":137,"q":"Wie hat sich ein überholendes Fahrzeug zu verhalten?","o":["Es hat dem zu überholenden Fahrzeug auszuweichen.","Es muss den größtmöglichen Abstand zum überholten Fahrzeug einhalten und Sog und Wellenschlag vermeiden.","Es darf die sichere Durchfahrt des zu überholenden Fahrzeugs nicht behindern.","Es muss vor dem Überholen ein Schallsignal abgeben, um die Zustimmung des zu überholenden Fahrzeugs einzuholen."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-138","n":138,"q":"Wie hat man sich zu verhalten, wenn man bei verminderter Sicht anscheinend vorlicher als querab das Schallsignal eines anderen Fahrzeugs hört?","o":["Es ist ebenfalls ein Schallsignal abzugeben und die Fahrt soweit zu verlangsamen, dass die Steuerfähigkeit noch erhalten bleibt. Erforderlichenfalls ist ganz aufzustoppen. In jedem Fall ist vorsichtig zu manövrieren, bis die Gefahr eines Zusammenstoßes vorüber ist.","Es ist ebenfalls ein Schallsignal abzugeben und frühzeitig, durchgreifend und klar erkennbar auszuweichen.","Es sind mindestens fünf kurze Töne mit der Pfeife abzugeben und das Manöver des letzten Augenblicks durchzuführen. Dabei ist so zu manövrieren, wie es zur Vermeidung eines Zusammenstoßes am dienlichsten ist.","Es ist ebenfalls ein Schallsignal abzugeben. Kurs und Geschwindigkeit sind so lange beizubehalten, bis das andere Fahrzeug in Sicht kommt. Dann ist die Ausweichsituation nach KVR zu prüfen und man muss sich entsprechend verhalten."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-139","n":139,"q":"Wie verhält man sich als Kurshalter, wenn man feststellt, dass ein anderes Fahrzeug seiner Ausweichpflicht nicht nachkommt und die Gefahr einer unmittelbaren Kollision bevorsteht?","o":["Man gibt mindestens fünf kurze Töne mit der Pfeife ab und führt das \"Manöver des letzten Augenblicks\" durch. Dabei ist so zu manövrieren, wie es zur Vermeidung eines Zusammenstoßes am dienlichsten ist.","Man gibt ein Schallsignal (vier kurze Töne) ab und verlangsamt die Fahrt soweit, dass die Steuerfähigkeit noch erhalten bleibt. Erforderlichenfalls ist ganz aufzustoppen. In jedem Fall ist vorsichtig zu manövrieren, bis die Gefahr eines Zusammenstoßes vorüber ist.","Man gibt mindestens fünf kurze Töne mit der Pfeife ab und reduziert die Geschwindigkeit, um Sog und Wellenschlag zu vermeiden.","Man behält Kurs und Geschwindigkeit zunächst bei und widmet dem Ausweichpflichtigen besondere Aufmerksamkeit."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-140","n":140,"q":"Welche Bedeutung hat folgendes Schallsignal? (mindestens )","o":["Ein ausweichpflichtiges Fahrzeug wird auf seine Ausweichpflicht aufmerksam gemacht.","Allgemeines Gefahren- und Warnsignal.","Bleib-Weg-Signal, Explosionsgefahr durch gefährliche Güter. Sofort den Gefahrenbereich verlassen. Feuer und Zündfunken vermeiden.","Seeschifffahrtsstraße gesperrt. Weiterfahrt verboten, sofort aufstoppen."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-141","n":141,"q":"Welche Bedeutung hat folgendes Schallsignal?","o":["Ein Ankerlieger macht ein sich näherndes Fahrzeug auf eine gefährliche Annäherung aufmerksam.","Die Maschine des Fahrzeugs läuft rückwärts.","Schutzbedürftige Anlage; Geschwindigkeit reduzieren, Sog und Wellenschlag vermeiden.","Maschinenfahrzeug, das seine Maschinen gestoppt hat und keine Fahrt durchs Wasser macht."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-142","n":142,"q":"Was ist bei der Benutzung eines Verkehrstrennungsgebietes zu beachten?","o":["Auf dem entsprechenden Einbahnweg in der allgemeinen Verkehrsrichtung fahren, soweit wie möglich von der Trennzone/ Trennlinie klar halten, in der Regel an den Enden des Einbahnweges ein- oder auslaufen, seitliches Ein- oder Auslaufen in möglichst kleinem Winkel zur allgemeinen Verkehrsrichtung.","Auf dem entsprechenden Einbahnweg in Verkehrsrichtung links von der Trennzone fahren, so nah wie möglich an der Trennzone/Trennlinie fahren, in der Regel an den Enden des Einbahnweges ein- oder auslaufen, seitliches Ein- oder Auslaufen in möglichst rechtem Winkel zur allgemeinen Verkehrsrichtung.","Die Benutzung von Verkehrstrennungsgebieten ist für Segelfahrzeuge sowie für Maschinenfahrzeuge unter 20 m Länge nicht gestattet. Diese Fahrzeuge haben sich soweit wie möglich von Verkehrstrennungsgebieten klar zu halten und müssen durch ihren Kurs klar zu erkennen geben, dass sie ein Verkehrstrennungsgebiet nicht benutzen.","Auf den entsprechenden Einbahnwegen in der allgemeinen Verkehrsrichtung fahrende Fahrzeuge müssen sich soweit wie möglich von der Trennzone/Trennlinie klar halten und haben Vorfahrt gegenüber allen Fahrzeugen, die in ein Verkehrstrennungsgebiet einlaufen oder ein solches queren."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-143","n":143,"q":"Was ist hinsichtlich des Querens eines Verkehrstrennungsgebietes zu beachten?","o":["Das Queren ist möglichst zu vermeiden. Falls gequert werden muss, hat dies möglichst mit der Kielrichtung im rechten Winkel zur allgemeinen Verkehrsrichtung zu erfolgen. Die Kielrichtung des querenden Fahrzeugs muss auch dann einen rechten Winkel zur allgemeinen Verkehrsrichtung bilden, wenn das Fahrzeug durch Wind oder Strom versetzt wird.","Das Queren ist möglichst zu vermeiden. Falls gequert werden muss, hat dies möglichst mit einem rechtweisenden Kurs zur allgemeinen Verkehrsrichtung zu erfolgen. Der rechtweisende Kurs des querenden Fahrzeugs muss auch dann einen rechten Winkel zur allgemeinen Verkehrsrichtung bilden, wenn das Fahrzeug durch Wind oder Strom versetzt wird.","Das Queren von Verkehrstrennungsgebieten ist für Segelfahrzeuge sowie für Maschinenfahrzeuge unter 20 m Länge verboten. Diese Fahrzeuge haben sich soweit wie möglich von den Enden der Verkehrstrennungsgebiete klar zu halten und müssen durch ihren Kurs zu erkennen geben, dass sie ein Verkehrstrennungsgebiet nicht queren.","Das Queren ist möglichst zu vermeiden. Falls gequert werden muss, hat dies mit der Kielrichtung in einem möglichst spitzen Winkel zur allgemeinen Verkehrsrichtung zu erfolgen. Die Kielrichtung des querenden Fahrzeugs muss auch dann einen möglichst spitzen Winkel zur allgemeinen Verkehrsrichtung bilden, wenn das Fahrzeug durch Wind oder Strom versetzt wird."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-144","n":144,"q":"In welcher Vorschrift findet man die Regeln zum Befahren von Verkehrstrennungsgebieten?","o":["In den Kollisionsverhütungsregeln.","In der Seeschifffahrtsstraßen-Ordnung.","In den Kollisionsverhütungsregeln und der Seeschifffahrtsstraßen-Ordnung.","In den \"Bekanntmachungen der Generaldirektion Wasserstraßen und Schifffahrt (GDWS)\"."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-145","n":145,"q":"Wie hat sich ein Maschinenfahrzeug bei Kollisionsgefahr in einem Einbahnweg eines Verkehrstrennungsgebietes gegenüber einem Maschinenfahrzeug zu verhalten, das den Einbahnweg von Steuerbord kommend quert?","o":["Es muss dem anderen Fahrzeug ausweichen.","Es darf die sichere Durchfahrt des Maschinenfahrzeugs nicht behindern.","Dem querenden Fahrzeug hat es besondere Aufmerksamkeit zu widmen.","Es muss das Manöver des letzten Augenblicks durchführen."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-146","n":146,"q":"Wie hat sich ein Segelfahrzeug beim Queren eines Verkehrstrennungsgebietes gegenüber einem Maschinenfahrzeug zu verhalten, das auf einem Einbahnweg in der allgemeinen Verkehrsrichtung fährt?","o":["Es darf die sichere Durchfahrt des Maschinenfahrzeugs nicht behindern.","Es unterliegt der Kurshaltepflicht. Kurs und Geschwindigkeit sind beizubehalten.","Es muss warten. Alle dem Einbahnweg folgenden Fahrzeuge haben Vorfahrt.","Es hat Vorfahrt. Alle dem Einbahnweg folgenden Fahrzeuge müssen warten."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-147","n":147,"q":"Wie haben sich Fahrzeuge von weniger als 20 m Länge oder Segelfahrzeuge in Verkehrstrennungsgebieten zu verhalten?","o":["Sie dürfen die sichere Durchfahrt eines dem Einbahnweg folgenden Maschinenfahrzeugs nicht behindern.","Sie gelten als Kleinfahrzeuge und dürfen Verkehrstrennungsgebiete nicht befahren.","Sie gelten als Kleinfahrzeuge und dürfen Verkehrstrennungsgebiete nur am Tage und bei guter Sicht befahren.","Sie dürfen die Trennzone befahren, damit der durchgehende Verkehr nicht behindert wird."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-148","n":148,"q":"Was ist das für ein Fahrzeug und was ist zu beachten?","o":["Ein manövrierbehindertes Fahrzeug, das baggert oder Unterwasserarbeiten ausführt und dabei die Schifffahrt behindert. Es ist an der Seite zu passieren, an der zwei schwarze Rhomben senkrecht übereinander angeordnet sind.","Ein manövrierbehindertes Fahrzeug, das die Schifffahrt behindert. Es ist an der Seite zu passieren, an der zwei schwarze Bälle senkrecht übereinander angeordnet sind.","Ein manövrierbehindertes Fahrzeug, das baggert oder Unterwasserarbeiten ausführt und dabei die Schifffahrt behindert. Es ist an der Seite zu passieren, die in meiner Fahrtrichtung rechts liegt.","Ein manövrierbehindertes Fahrzeug, das baggert oder Unterwasserarbeiten ausführt und dabei die Schifffahrt behindert. Es darf an keiner Seite passiert werden."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-149","n":149,"q":"Was ist das für ein Fahrzeug und was ist zu beachten?","o":["Ein manövrierbehindertes Fahrzeug mit Fahrt durchs Wasser, das baggert oder Unterwasserarbeiten ausführt und dabei die Schifffahrt nicht behindert. Es ist an der Seite zu passieren, die in Fahrtrichtung rechts liegt.","Ein manövrierbehindertes Fahrzeug mit Fahrt durchs Wasser, das baggert oder Unterwasserarbeiten ausführt und dabei die Schifffahrt behindert. Es ist an der Seite zu passieren, die in Fahrtrichtung links liegt.","Ein manövrierunfähiges Fahrzeug mit Fahrt durchs Wasser, das baggert oder Unterwasserarbeiten ausführt und dabei die Schifffahrt behindert. Es ist an der Seite zu passieren, die in Fahrtrichtung rechts liegt.","Ein manövrierbehindertes Fahrzeug mit Fahrt durchs Wasser, das baggert oder Unterwasserarbeiten ausführt und dabei die Schifffahrt behindert. Es darf an beiden Seiten passiert werden."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-150","n":150,"q":"Was ist das für ein Fahrzeug und was ist zu beachten?","o":["Ein manövrierbehindertes Fahrzeug ohne Fahrt durchs Wasser, das baggert oder Unterwasserarbeiten ausführt und dabei die Schifffahrt behindert. Es ist an der Seite zu passieren, an der zwei grüne Rundumlichter senkrecht übereinander angeordnet sind.","Ein manövrierbehindertes Fahrzeug ohne Fahrt durchs Wasser, das die Schifffahrt behindert. Es ist an der Seite zu passieren, an der zwei rote Rundumlichter senkrecht übereinander angeordnet sind.","Ein manövrierbehindertes Fahrzeug ohne Fahrt durchs Wasser, das baggert oder Unterwasserarbeiten ausführt und dabei die Schifffahrt behindert. Es ist an der Seite zu passieren, die in Fahrtrichtung links liegt.","Ein manövrierbehindertes Fahrzeug ohne Fahrt durchs Wasser, das baggert oder Unterwasserarbeiten ausführt und dabei die Schifffahrt behindert. Es ist an der Steuerbordseite des Fahrwassers (Rechtsfahrgebot) zu passieren."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-151","n":151,"q":"Was ist das für ein Fahrzeug und was ist zu beachten?","o":["Fahrzeug mit gefährlichen Gütern, Abstand halten, Rauchen und offenes Feuer verboten.","Fahrzeug des öffentlichen Dienstes. Es darf von den Verkehrsregeln abweichen.","Fahrzeug in Seenot. Hilfe leisten bzw. weitere Hilfe anfordern.","Fahrzeug mit Taucher im Einsatz. Großen Abstand halten."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-152","n":152,"q":"Wo ist festgelegt, welche Wasserflächen Seeschifffahrtsstraßen sind?","o":["Seeschifffahrtsstraßen-Ordnung und Schifffahrtsordnung Emsmündung.","Seeschifffahrtsstraßen-Ordnung und Kollisionsverhütungsregeln.","Kollisionsverhütungsregeln und Schifffahrtsordnung Emsmündung.","Kollisionsverhütungsregeln und Seeaufgabengesetz."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-153","n":153,"q":"Welche örtlichen Sondervorschriften zusätzlich zur Seeschifffahrtsstraßen-Ordnung (SeeSchStrO) und zur Schifffahrtsordnung Emsmündung (EmsSchO) gibt es und was ist darin geregelt?","o":["Die Bekanntmachungen der Generaldirektion Wasserstraßen und Schifffahrt (GDWS), die besondere örtliche Regelungen enthalten und Hinweise für die einzelnen Seeschifffahrtsstraßen geben.","Die Nachrichten für Seefahrer (NfS), herausgegeben vom Bundesamt für Seeschifffahrt und Hydrographie, sowie die Bekanntmachungen für Seefahrer (BfS) der örtlich zuständigen Wasserstraßen- und Schifffahrtsämter, die auf alle Veränderungen hinsichtlich Betonnung, Befeuerung, Wracks und Untiefen sowie auf die Schifffahrt betreffende Maßnahmen und Ereignisse hinweisen.","Die Bekanntmachung der Generaldirektion Wasserstraßen und Schifffahrt (GDWS) sowie die nautische Veröffentlichung \"Sicherheit auf dem Wasser\", herausgegeben durch das Bundesministerium für Digitales und Verkehr (BMDV), mit wichtigen Regeln und Tipps für Wassersportler.","Das Seesicherheitsuntersuchungsgesetz sowie die Verordnung über die Sicherung der Seefahrt, die jeweils wichtige Vorschriften über das Verhalten nach einem Zusammenstoß auf den jeweiligen Seeschifffahrtsstraßen enthalten."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-154","n":154,"q":"Was ist das für ein Fahrzeug und was ist zu beachten?","o":["Fahrzeug des öffentlichen Dienstes im Einsatz. Es darf von den Verkehrsvorschriften abweichen.","Fahrzeug der Bundesmarine im Einsatz. Es hat Munition oder andere Gefahrgüter an Bord.","Lotsenfahrzeug mit Sonderrechten im Einsatz. Es darf vom Rechtsfahrgebot abweichen.","Tiefgangbehindertes Fahrzeug. Es darf nicht behindert werden."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-155","n":155,"q":"Wer gibt das Sichtzeichen \"Leuchtkugeln mit weißen Sternen\" und was ist zu beachten?","o":["Fahrzeug der Bundeswehr, der Bundespolizei oder Maschinenfahrzeug, das Schießscheiben schleppt bei Übungen. Man hält sich frei.","Fahrzeug, das mit Netzen, Leinen, Schleppnetzen oder anderen Fanggeräten fischt und auf sich aufmerksam macht. Ausreichenden Abstand halten.","Fahrzeug in Seenot, das auf sich aufmerksam macht. Hilfe leisten, ggf. weitere Hilfe anfordern.","Maschinenfahrzeug über 50 m Länge bei der Anforderung eines Lotsen. Man behält Kurs und Geschwindigkeit bei."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-156","n":156,"q":"Was sind Fahrwasser im Sinne der Seeschifffahrtsstraßen-Ordnung (SeeSchStrO) und der Schifffahrtsordnung Emsmündung (EmsSchO)?","o":["Es sind Wasserflächen, die durchgehend durch Fahrwasserseitenbezeichnung begrenzt oder gekennzeichnet sind, binnenwärts der Flussmündungen auch nicht gekennzeichnete Wasserflächen, die für die durchgehende Schifffahrt bestimmt sind.","Es sind Wasserflächen, die für Seeschiffe zugelassen sind; binnenwärts der Flussmündungen sind auch Binnenschiffe und Sportboote zugelassen.","Es sind Wasserflächen, die durchgehend durch Fahrwasserseitenbezeichnung begrenzt oder gekennzeichnet sind und auf denen das Wasserskifahren sowie das Fahren mit Wassermotorrädern erlaubt ist, sofern die durchgehende Schifffahrt nicht behindert wird.","Es sind Wasserflächen, die durchgehend durch Fahrwasserseitenbezeichnung begrenzt oder gekennzeichnet sind und auf denen die Sportbootführerscheinverordnung Gültigkeit hat."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-157","n":157,"q":"Welches ist - außer in Wattgebieten - die Steuerbordseite eines Fahrwassers?","o":["Es ist die Seite, die ein von See kommendes Schiff an seiner Steuerbordseite hat.","Es ist die Seite, die ein von See kommendes Schiff an seiner Backbordseite hat.","Es ist die Seite, die von See kommend mit roten Tonnen bezeichnet ist.","Es ist die Seite, auf der die Tonnen mit fortlaufenden geraden Zahlen gekennzeichnet sind."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-158","n":158,"q":"Welche verkehrsrechtliche Verpflichtung hat ein Fahrzeugführer nach § 3 der Seeschifffahrtsstraßen-Ordnung (SeeSchStrO), dessen Fahrzeug mit einer UKW-Funkanlage ausgerüstet ist?","o":["Er ist verpflichtet, die von der Verkehrszentrale gegebenen Verkehrsinformationen und -unterstützungen abzuhören und zu berücksichtigen.","Er ist verpflichtet, bei der Nutzung einer UKW-Funkanlage im Besitz des entsprechenden Funkzeugnisses zu sein.","Er ist verpflichtet, bei verminderter Sicht regelmäßig seinen Schiffsnamen und seine Position der Verkehrszentrale mitzuteilen.","Er ist verpflichtet, die Funkanlage während der Fahrt in Betrieb zu halten und alle sein Fahrzeug betreffenden Mitteilungen im Schiffslogbuch festzuhalten."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-159","n":159,"q":"Welches Licht muss ein Fahrzeug unter Segel von weniger als 12 m Länge oder ein Fahrzeug unter Ruder auf der Seeschifffahrtsstraße führen, wenn es die nach den Kollisionsverhütungsregeln (KVR) vorgeschriebenen Lichter nicht führen kann?","o":["Ein weißes Rundumlicht.","Ein rotes Rundumlicht.","Ein weißes Topplicht.","Eine Dreifarbenlaterne."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-160","n":160,"q":"Wann darf ein Maschinenfahrzeug von weniger als 7 m Länge auf Seeschifffahrtsstraßen nicht fahren, wenn es die nach den Kollisionsverhütungsregeln (KVR) vorgeschriebenen Lichter nicht führen kann?","o":["Es darf in der Zeit, in der die Lichterführung vorgeschrieben ist, nicht fahren, es sei denn, dass ein Notstand vorliegt.","Es darf in der Zeit zwischen Sonnenaufgang und Sonnenuntergang nicht fahren.","Es darf in der Zeit, in der die Lichterführung vorgeschrieben ist, nur dann fahren, wenn ein betriebsbedingtes Signalhorn an Bord ist.","Es darf in der Zeit zwischen Sonnenuntergang und Sonnenaufgang nicht fahren."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-161","n":161,"q":"Welches Schallsignal ist beim Einlaufen in Fahrwasser und Häfen zu geben, wenn die Verkehrslage es erfordert?","o":["Ein langer Ton.","Ein kurzer Ton.","Ein kurzer und ein langer Ton.","Ein langer und ein kurzer Ton."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-162","n":162,"q":"Welche Bedeutung hat folgendes Schallsignal?","o":["Allgemeines \"Gefahr- und Warnsignal\".","Sperrung der Seeschifffahrtsstraße.","Sofort anhalten (Fahrzeug des öffentlichen Dienstes).","Brücke/Schleuse kann vorübergehend nicht geöffnet werden."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-163","n":163,"q":"Wie lautet das \"allgemeine Gefahr- und Warnsignal\"?","o":["Zwei Gruppen von je einem langen und vier kurzen Tönen.","Zwei Gruppen von je drei langen Tönen.","Zwei Gruppen von je vier kurzen Tönen.","Zwei Gruppen von je einem kurzen und vier langen Tönen."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-164","n":164,"q":"Wann ist das \"allgemeine Gefahr- und Warnsignal\" zu geben?","o":["Wenn ein Fahrzeug ein anderes Fahrzeug gefährdet oder durch dieses selbst gefährdet wird.","Wenn ein Fahrzeug ein anderes Fahrzeug im Fahrwasser an Steuerbord überholen will.","Wenn ein Fahrzeug einem anderen Fahrzeug nicht ausweichen kann.","Wenn ein Fahrzeug ein anderes Fahrzeug zur Hilfeleistung auffordert."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-165","n":165,"q":"Wie haben sich Fahrzeuge zu verhalten, die in ein Fahrwasser einlaufen, ein Fahrwasser queren, im Fahrwasser drehen oder ihre Anker- und Liegeplätze verlassen?","o":["Sie haben die Vorfahrt der dem Fahrwasserverlauf folgenden Fahrzeuge zu beachten.","Sie haben die Vorfahrt vor den Fahrzeugen im Fahrwasser.","Sie haben einen kurzen Ton als Achtungssignal abzugeben.","Sie haben ihr Manöver so durchzuführen, dass andere Fahrzeuge nicht behindert werden."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-166","n":166,"q":"Wie haben Segelfahrzeuge im Fahrwasser, die nicht deutlich der Richtung eines Fahrwassers folgen, untereinander auszuweichen?","o":["Sie haben untereinander nach den Regeln der KVR auszuweichen, wenn sie dadurch vorfahrtberechtigte Fahrzeuge nicht gefährden oder behindern.","Sie haben untereinander nach den Regeln der Seeschifffahrtsstraßen-Ordnung auszuweichen, wenn sie dadurch vorfahrtberechtigte Fahrzeuge nicht gefährden oder behindern.","Sie haben untereinander nach den Regeln der Schifffahrtsordnung Emsmündung auszuweichen, wenn sie dadurch vorfahrtberechtigte Fahrzeuge nicht gefährden oder behindern.","Sie haben untereinander nach den Regeln der Binnenschifffahrtsstraßen-Ordnung auszuweichen, wenn sie dadurch vorfahrtberechtigte Fahrzeuge nicht gefährden oder behindern."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-167","n":167,"q":"Welche Ausweichregeln gelten außerhalb des Fahrwassers?","o":["Die Regeln der KVR.","Die Regeln der Seeschifffahrtsstraßen-Ordnung.","Die Regeln der Schifffahrtsordnung Emsmündung.","Die Regeln der Binnenschifffahrtsstraßen-Ordnung."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-168","n":168,"q":"Wo ist das Überholen verboten?","o":["An Engstellen, unübersichtlichen Krümmungen, in Schleusenbereichen, innerhalb durch Überholverbotszeichen gekennzeichneter Strecken, in der Nähe nicht frei fahrender Fähren in Fahrt.","An Engstellen, unübersichtlichen Krümmungen, in Schleusenbereichen, innerhalb durch Überholverbotszeichen gekennzeichneter Strecken, in der Nähe nicht frei fahrender Fähren in Fahrt und außerhalb des Fahrwassers.","An Engstellen, unübersichtlichen Krümmungen, in Schleusenbereichen, innerhalb durch Überholverbotszeichen gekennzeichneter Strecken, in der Nähe nicht frei fahrender Fähren in Fahrt, und in Verkehrstrennungsgebieten.","An Engstellen, unübersichtlichen Krümmungen, innerhalb durch Überholverbotszeichen gekennzeichneter Strecken und in Nationalparks und besonders ausgewiesenen Naturschutzgebieten."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-169","n":169,"q":"Wo darf Wasserski gelaufen, Wassermotorrad gefahren oder mit einem Segelsurfbrett gefahren werden?","o":["Außerhalb des Fahrwassers, wenn es nicht von der Generaldirektion Wasserstraßen und Schifffahrt (GDWS) durch Bekanntmachung verboten ist. Im Fahrwasser auf Abschnitten, die durch die GDWS bekanntgemacht oder durch blaue Tafeln mit dem weißen Symbol eines Wasserskiläufers, eines Wassermotorrades oder eines Segelsurfers bezeichnet sind.","Außerhalb der Seeschifffahrtsstraße, wenn es nicht von der Generaldirektion Wasserstraßen und Schifffahrt (GDWS) durch Bekanntmachung verboten ist. Innerhalb der Seeschifffahrtsstraße auf Abschnitten, die durch die GDWS bekanntgemacht oder durch blaue Tafeln mit dem weißen Symbol eines Wasserskiläufers, eines Wassermotorrades oder eines Segelsurfers bezeichnet sind.","Auf der hohen See und auf den mit dieser zusammenhängenden, von Seeschiffen befahrbaren Gewässern, sofern dabei ein Abstand von mindestens 100 m zum Ufer eingehalten wird.","Im Fahrwasser, wenn es nicht von der Generaldirektion Wasserstraßen und Schifffahrt (GDWS) durch Bekanntmachung verboten ist. Außerhalb des Fahrwassers auf Abschnitten, die durch die GDWS bekanntgemacht oder durch blaue Tafeln mit dem weißen Symbol eines Wasserskiläufers, eines Wassermotorrades oder eines Segelsurfers bezeichnet sind."],"a":[0]},{"scope":"see","cat":"Betonnung & Schifffahrtszeichen (See)","id":"s-170","n":170,"q":"Wie haben sich Führer von Zugbooten der Wasserskiläufer bzw. Wassermotorradfahrer und Segelsurfer bei der Annäherung an andere Fahrzeuge zu verhalten?","o":["Sie haben auszuweichen.","Sie haben bei Annäherung an andere Fahrzeuge aufzustoppen und Sog und Wellenschlag zu vermeiden.","Sie haben Vorfahrt und müssen vor dem Bug des anderen Fahrzeugs kreuzen.","Sie müssen Kurs und Geschwindigkeit beibehalten."],"a":[0]},{"scope":"see","cat":"Ausweichregeln (KVR/See)","id":"s-171","n":171,"q":"Wo ist das Ankern verboten?","o":["Im Fahrwasser, an Engstellen und in unübersichtlichen Krümmungen; im Umkreis von 300 m von schwimmenden Geräten, Wracks und sonstigen Schifffahrtshindernissen, Kabeltonnen und sonstigen Stellen für militärische und zivile Zwecke; vor Hafeneinfahrten, Schleusen, Anlegestellen und Sielen sowie in den Zufahrten des Nord-Ostsee-Kanals; innerhalb von Fähr- und Brückenstrecken; 300 m vor und hinter Ankerverbotszeichen.","Im Fahrwasser, auf Seeschifffahrtsstraßen, an Engstellen und in unübersichtlichen Krümmungen; im Umkreis von 300 m von schwimmenden Geräten, Wracks und sonstigen Schifffahrtshindernissen, Kabeltonnen und sonstigen Stellen für militärische und zivile Zwecke; vor Hafeneinfahrten, Schleusen, Anlegestellen und Sielen sowie in den Zufahrten des Nord-Ostsee-Kanals; innerhalb von Fähr- und Brückenstrecken; 300 m vor und hinter Ankerverbotszeichen.","Im Fahrwasser, an Engstellen und in unübersichtlichen Krümmungen; im Umkreis von 300 m von schwimmenden Geräten, Kabeltonnen und sonstigen Stellen für militärische und zivile Zwecke; vor Hafeneinfahrten, Schleusen, Anlegestellen und Sielen sowie in den Zufahrten des Nord-Ostsee-Kanals und in Vogelschutz- und Naturschutzgebieten sowie generell innerhalb von Nationalparks.","Im Fahrwasser, wenn es durch die Generaldirektion Wasserstraßen und Schifffahrt (GDWS) bekanntgemacht worden ist. Außerhalb des Fahrwassers auf Abschnitten, die durch die GDWS bekanntgemacht oder durch entsprechende Sichtzeichen bezeichnet sind."],"a":[0]},{"scope":"see","cat":"Ausweichregeln (KVR/See)","id":"s-172","n":172,"q":"Was ist zu unternehmen, um die Schifffahrt zu warnen, wenn das eigene Fahrzeug gesunken ist und ein Schifffahrtshindernis darstellt?","o":["Man informiert die Schifffahrtspolizeibehörde und gibt nach Möglichkeit die Position an.","Man informiert die Deutsche Gesellschaft zur Rettung Schiffbrüchiger, damit das Hindernis gekennzeichnet werden kann.","Man gibt ein Seenotsignal ab.","Man informiert das Bundesamt für Seeschifffahrt und Hydrographie und gibt nach Möglichkeit die Position an."],"a":[0]},{"scope":"see","cat":"Ausweichregeln (KVR/See)","id":"s-173","n":173,"q":"Bei welchem Signal dürfen Sportfahrzeuge in die Schleusen des Nord-Ostsee-Kanals einfahren?","o":["Wenn ein weißes unterbrochenes Licht gezeigt wird.","Wenn ein weißes Funkellicht gezeigt wird.","Wenn zwei grüne Lichter nebeneinander gezeigt werden.","Wenn ein grünes Gleichtaktlicht gezeigt wird."],"a":[0]},{"scope":"see","cat":"Ausweichregeln (KVR/See)","id":"s-174","n":174,"q":"Wo findet man Regeln für das Durchfahren des Nord-Ostsee-Kanals (NOK)?","o":["Ergänzende Vorschriften für den NOK in der Seeschifffahrtsstraßen-Ordnung sowie in den Bekanntmachungen der Generaldirektion Wasserstraßen und Schifffahrt (GDWS).","Ergänzende Vorschriften für den NOK in der Seeschifffahrtsstraßen-Ordnung s meiden."],"a":[0]},{"scope":"see","cat":"Sicherheit, Notfall & Seemannschaft (See)","id":"s-258","n":258,"q":"Womit kann ein steuerunfähiges Sportboot mit dem Bug in den Wind gehalten werden?","o":["Mit dem Treibanker oder anderen geeigneten schwimmfähigen Gegenständen.","Durch wiederholtes kurzes Ein- und Auskuppeln der Antriebsmaschine.","Mit achteraus ausgebrachtem Treibanker oder ähnlichen schwimmfähigen Gegenständen.","Mit vorn und achtern ausgebrachten Treibankern oder anderen geeigneten schwimmfähigen Gegenständen."],"a":[0]},{"scope":"see","cat":"Sicherheit, Notfall & Seemannschaft (See)","id":"s-259","n":259,"q":"Warum sollte bei starkem Seegang die Fahrt vermindert werden?","o":["Um Schäden durch Seeschlag zu vermeiden.","Um das Austauchen der Schraube zu vermeiden und Kraftstoff zu sparen.","Um die Schlinger- und Rollbewegungen zu minimieren.","Um Schiffs- und Wellenlänge nicht in Resonanz zu bringen."],"a":[0]},{"scope":"see","cat":"Sicherheit, Notfall & Seemannschaft (See)","id":"s-260","n":260,"q":"Was bedeutet folgendes Zeichen?","o":["Wind aus Richtung Nordwest; Stärke: Bft. 3; wolkenlos.","Wind in Richtung Nordwest; Stärke: Bft. 3; wolkenlos.","Strom aus Richtung Nordwest; Stärke: 3 Knoten; Tidegebiet.","Strom in Richtung Nordwest; Stärke: 3 Knoten; Tidegebiet."],"a":[0]},{"scope":"see","cat":"Sicherheit, Notfall & Seemannschaft (See)","id":"s-261","n":261,"q":"Welche Angaben liefert die Beaufort-Skala?","o":["Windstärken von 0 bis 12 und die Auswirkungen auf die See.","Windstärken von 0 bis 12 und die Auswirkungen auf die Küste.","Den Tidenhub an der Küste bei Vollmond und bei Neumond.","Die Wellenhöhe und die Windgeschwindigkeit bei Sturmstärke."],"a":[0]},{"scope":"see","cat":"Sicherheit, Notfall & Seemannschaft (See)","id":"s-262","n":262,"q":"Wie werden Orte gleichen Luftdrucks in der Wetterkarte dargestellt und in welcher Maßeinheit wird der Luftdruck angegeben?","o":["Durch Isobaren und in Hektopascal.","Durch Isobaren und in Millipascal.","D eiterfahren und möglichst im Kielwasser eines vorausfahrenden Fahrzeugs halten.","Umsichtig, aber zügig weiterfahren, um den übrigen Verkehr nicht zu behindern. Beim Hören fremder Nebelsignale aufstoppen und abwarten, dabei fortlaufend die Wassertiefe loten.","Im Fahrwasser äußerst rechts halten und den nächstgelegenen Hafen oder Liegeplatz anlaufen. Im Zweifel andere Fahrzeuge nach Position und richtigem Kurs fragen."],"a":[0]},{"scope":"see","cat":"Sicherheit, Notfall & Seemannschaft (See)","id":"s-272","n":272,"q":"Wozu dient primär das Automatische Identifikationssystem (AIS)?","o":["Der Kollisionsverhütung.","Dem Empfang von Wetterdaten.","Der Positionsbestimmung.","Dem Senden nautischer Warnnachrichten."],"a":[0]},{"scope":"see","cat":"Sicherheit, Notfall & Seemannschaft (See)","id":"s-273","n":273,"q":"Welche Informationen können über das Automatische Identifikationssystem (AIS) ausgetauscht werden?","o":["Schiffsdaten (statisch und dynamisch), reisebezogene Daten.","Schiffsdaten (statisch und dynamisch), Wetterdaten.","Schiffsdaten (statisch), reisebezogene Daten.","Schiffsdaten (dynamisch), Wetterdaten."],"a":[0]},{"scope":"see","cat":"Sicherheit, Notfall & Seemannschaft (See)","id":"s-274","n":274,"q":"Welche Sicherheitsmaßnahmen sind an Bord aufgrund der seemännischen Sorgfaltspflicht neben den in den Kollisionsverhütungsregeln vorgeschriebenen Verhaltensmaßregeln bei verminderter Sicht zu treffen?","o":["Insbesondere alle Navigationsanlagen sorgfältig gebrauchen, die Sichtbarkeit des eigenen Fahrzeugs erhöhen (z. B. Radarreflektor, AIS) und in einem Revier mit Landradarberatung die Radarberatung über UKW-Sprechfunk mithören.","Insbesondere alle technischen Anlagen, z. B. Radar, AIS, Echolot, Selbststeueranlage einschalten und in einem Revier mit Landradarberatung die Radarberatung über UKW-Sprechfunk anfordern.","Insbesondere alle Navigationsanlagen sorgfältig gebrauchen, die Sichtbarkeit des eigenen Fahrzeugs erhöhen (z. B. Radarreflektor, AIS) und die n Kräfteverschleiß vermeiden.","Möglichst am Fahrzeug bleiben und Unfallstelle kennzeichnen; unnötigen Kräfteverschleiß vermeiden und Aufmerksamkeit zur Hilfeleistung erregen.","Möglichst am Fahrzeug bleiben und die Besatzung zusammenhalten; Wertgegenstände und Seetagebuch bergen."],"a":[0]},{"scope":"see","cat":"Sicherheit, Notfall & Seemannschaft (See)","id":"s-278","n":278,"q":"Wie verhindert man das Überbordfallen von Personen bei starkem Seegang?","o":["Sicherheitsleinen bzw. -gurte spannen, Sicherheitsgurt anlegen und an den dafür vorgesehenen Stellen einpicken.","Sicherheitsleinen bzw. -gurte spannen, Besatzung an Deck sammeln. Rettungswesten anlegen.","Sicherheitsleinen bzw. -gurte aufschießen, Sicherheitsgurt anlegen und in die Reling einpicken.","Besatzung in der Plicht versammeln, Rettungswesten anlegen, Sicherheitsleinen bzw. -gurte spannen."],"a":[0]},{"scope":"see","cat":"Sicherheit, Notfall & Seemannschaft (See)","id":"s-279","n":279,"q":"Welche Notsignale können gegeben werden?","o":["Leuchtrakete mit rotem Leuchtstern oder rot brennende Handfackel, anhaltendes Ertönen eines Nebelsignalgerätes, dreimaliges Geben per Licht oder Ton, dreimal das Wort MAYDAY über Sprechfunk, seitliches Heben und Senken der Arme, Flaggensignal NC, EPIRB, DSC, Radartransponder.","Leuchtrakete mit rotem Leuchtstern oder rot brennende Handfackel, anhaltendes Ertönen eines Nebelsignalgerätes, dreimaliges Geben per Licht oder Ton, Seewasserfärber, seitliches Heben und Senken der Arme, Ball über oder unter Flaggensignal NC, EPIRB, DSC, Radartransponder.","Leuchtrakete mit orangem Leuchtstern oder orange brennende Handfackel, rotes Rauchsignal, anhaltendes Ertönen eines Nebelsignalgerätes, dreimaliges Geben per Licht oder Ton, dreimal das Wort MAYDAY über Sprechfunk, seitliches Heben und Senken der Arme, Flaggensignal NC, EPIRB, DSC, Radartransponder.","Leuchtrakete mit rotem Leuchtstern oder rot brennende Handfackel, anhaltendes Ertönen eines Nebelsignalgerätes, dreimaliges Ge /* ===== Speicherung ===== */
const STORE_KEY="sbf_trainer_v1";
let LS=true; try{localStorage.setItem("__t","1");localStorage.removeItem("__t");}catch(e){LS=false;}
let memStore=null;
function loadState(){let raw=null;if(LS){try{raw=localStorage.getItem(STORE_KEY);}catch(e){}}else raw=memStore;if(raw){try{return JSON.parse(raw);}catch(e){}}return null;}
function saveState(){const raw=JSON.stringify(state);if(LS){try{localStorage.setItem(STORE_KEY,raw);}catch(e){}}else memStore=raw;}
function freshState(){const cards={};QUESTIONS.forEach(q=>{cards[q.id]={seen:0,correct:0,wrong:0,streak:0};});
  return {cards,theme:"dark",globalSeen:0,globalCorrect:0,scope:"binnen",cat:"ALLE",examHistory:[]};}
function normalizeState(s){
  if(!s||typeof s!=="object")s={};
  if(!s.cards||typeof s.cards!=="object")s.cards={};
  if(s.theme!=="dark"&&s.theme!=="light")s.theme="dark";
  if(!["binnen","see","all"].includes(s.scope))s.scope="binnen";
  if(typeof s.cat!=="string")s.cat="ALLE";
  if(typeof s.globalSeen!=="number"||s.globalSeen<0)s.globalSeen=0;
  if(typeof s.globalCorrect!=="number"||s.globalCorrect<0)s.globalCorrect=0;
  if(!Array.isArray(s.examHistory))s.examHistory=[];
  QUESTIONS.forEach(q=>{if(!s.cards[q.id])s.cards[q.id]={seen:0,correct:0,wrong:0,streak:0};});
  return s;
}
let state=normalizeState(loadState()||freshState());

/* ===== Helfer ===== */
const $=s=>document.querySelector(s);
const views=["home","quiz","flash","results"];
function show(v){views.forEach(x=>$("#view-"+x).classList.toggle("hidden",x!==v));
  document.body.classList.toggle("has-nav",v==="quiz");window.scrollTo(0,0);}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2300);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
// erkennt Bild-/Tafelzeichen-Fragen (im Textkatalog ohne Grafik)
